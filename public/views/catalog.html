<div class="catalog-container">
  <div class="catalog-header">
    <div style="flex-grow:1;">
      <h1 style="font-size:2rem; margin-bottom:0.5rem;">AI Product Catalog</h1>
      <p style="color:var(--text-secondary);">Browse, search, and integrate with state-of-the-art AI foundation models, custom tools, and automated business agents.</p>
    </div>
    <div class="view-toggles">
      <button class="view-toggle-btn active" id="btn-grid-view" onclick="setCatalogViewLayout('grid')" title="Grid Layout">
        <i data-lucide="grid" style="width:1.2rem; height:1.1rem;"></i>
      </button>
      <button class="view-toggle-btn" id="btn-list-view" onclick="setCatalogViewLayout('list')" title="List Layout">
        <i data-lucide="list" style="width:1.2rem; height:1.1rem;"></i>
      </button>
    </div>
  </div>

  <!-- Search and Filtering bar -->
  <div class="filter-bar panel">
    <div class="search-box">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="catalog-search" class="input-control" placeholder="Search APIs by name, tags, description..." oninput="filterCatalogProducts()" autocomplete="off">
    </div>
    
    <div class="sorting-box">
      <label for="catalog-sort" style="font-size:0.875rem; color:var(--text-secondary);">Sort by:</label>
      <select id="catalog-sort" class="input-control select-control" onchange="filterCatalogProducts()">
        <option value="name-asc">Name (A-Z)</option>
        <option value="name-desc">Name (Z-A)</option>
        <option value="style">Protocol / Style</option>
      </select>
    </div>
  </div>

  <!-- Category Selection Chips -->
  <div class="category-chips" id="category-chips-container">
    <button class="chip active" data-category="all" onclick="selectCatalogCategory('all')">All Products</button>
    <!-- Dynamic chips injected here -->
  </div>

  <!-- Catalog Results -->
  <div id="catalog-results" class="catalog-grid">
    <!-- Dynamic products list injected here -->
  </div>
</div>

<style>
.catalog-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
  margin-bottom: 2rem;
}
@media (max-width: 768px) {
  .catalog-header {
    flex-direction: column;
    align-items: flex-start;
  }
}

.view-toggles {
  display: flex;
  background: var(--panel-bg);
  border: 1px solid var(--border-color);
  border-radius: 0.5rem;
  padding: 0.25rem;
}
.view-toggle-btn {
  background: none;
  border: none;
  cursor: pointer;
  width: 2.25rem;
  height: 2.25rem;
  border-radius: 0.375rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.view-toggle-btn.active {
  background: var(--primary);
  color: #fff;
}

/* Filter Bar styles */
.filter-bar {
  display: flex;
  gap: 1.5rem;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  align-items: center;
}
@media (max-width: 768px) {
  .filter-bar {
    flex-direction: column;
    align-items: stretch;
  }
}
.search-box {
  position: relative;
  flex-grow: 1;
}
.search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 1.15rem;
  height: 1.15rem;
}
#catalog-search {
  padding-left: 2.75rem;
}
.sorting-box {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}
.select-control {
  padding: 0.5rem 2rem 0.5rem 1rem;
  width: auto;
  background-color: var(--input-bg);
  cursor: pointer;
}

/* Category Chips */
.category-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 2rem;
}
.chip {
  background: var(--panel-bg);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  padding: 0.5rem 1.25rem;
  border-radius: 9999px;
  cursor: pointer;
  font-weight: 500;
  transition: all var(--transition-fast);
}
.chip:hover, .chip.active {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--text-primary);
}

/* Catalog Grid/List Layouts */
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.5rem;
  transition: all var(--transition-normal);
}
.catalog-grid.list-view {
  grid-template-columns: 1fr;
}

/* Cards styling */
.product-card {
  padding: 1.75rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  position: relative;
  overflow: hidden;
  height: 100%;
}
.product-card:hover {
  transform: translateY(-3px);
  border-color: var(--primary);
  box-shadow: var(--shadow-xl);
}
.catalog-grid.list-view .product-card {
  flex-direction: row;
  align-items: center;
  gap: 2rem;
  padding: 1.25rem 2rem;
}
@media (max-width: 768px) {
  .catalog-grid.list-view .product-card {
    flex-direction: column;
    align-items: stretch;
    gap: 1.25rem;
  }
}

.prod-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}
.prod-icon {
  width: 2.75rem;
  height: 2.75rem;
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 0.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.style-badge {
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  padding: 0.25rem 0.5rem;
  border-radius: 0.25rem;
  text-transform: uppercase;
}
.style-badge.rest {
  background: rgba(6, 182, 212, 0.15);
  color: #06b6d4;
  border: 1px solid rgba(6, 182, 212, 0.3);
}
.style-badge.mcp {
  background: rgba(99, 102, 241, 0.15);
  color: #818cf8;
  border: 1px solid rgba(99, 102, 241, 0.3);
}
.style-badge.a2a {
  background: rgba(16, 185, 129, 0.15);
  color: #34d399;
  border: 1px solid rgba(16, 185, 129, 0.3);
}

.prod-body {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  flex-grow: 1;
}
.prod-title {
  font-size: 1.25rem;
  font-weight: 700;
}
.prod-desc {
  color: var(--text-secondary);
  font-size: 0.9rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.catalog-grid.list-view .prod-desc {
  -webkit-line-clamp: 1;
}

.prod-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border-color);
  padding-top: 1rem;
  margin-top: auto;
  font-size: 0.8rem;
}
.catalog-grid.list-view .prod-footer {
  border-top: none;
  padding-top: 0;
  margin-top: 0;
  flex-shrink: 0;
  width: 250px;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.5rem;
}
@media (max-width: 768px) {
  .catalog-grid.list-view .prod-footer {
    width: auto;
    align-items: flex-start;
    border-top: 1px solid var(--border-color);
    padding-top: 1rem;
  }
}

.tag-list {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.tag-badge {
  background: var(--border-color);
  color: var(--text-secondary);
  font-size: 0.725rem;
  padding: 0.125rem 0.375rem;
  border-radius: 0.25rem;
}
</style>

<script>
// Catalog Logic scoped state
var catalogLayout = 'grid';
var catalogSelectedCategory = 'all';

// Initialize catalog products loader
window.viewInitializers['catalog'] = async function() {
  console.log("Catalog initialization running...");
  
  // Clean filter categories loaded from home redirects
  const redirectedFilter = localStorage.getItem('catalog_filter_cat');
  if (redirectedFilter) {
    catalogSelectedCategory = redirectedFilter;
    localStorage.removeItem('catalog_filter_cat');
  } else {
    catalogSelectedCategory = 'all';
  }
  
  await loadCatalogProducts();
};

async function loadCatalogProducts() {
  try {
    let products = [];
    if (CONFIG.demoMode) {
      const res = await fetch('/mock-products.json');
      const data = await res.json();
      products = data.products || [];
    } else {
      const res = await fetch(`${CONFIG.apiHost}/api/portals/${CONFIG.portalId}/products`);
      if (!res.ok) throw new Error('Failed to fetch live products');
      const data = await res.json();
      products = data.products || [];
    }
    
    app.products = products;
    
    // Dynamically build category chips
    buildCategoryChips();
    
    // Run filter
    filterCatalogProducts();
  } catch (err) {
    console.error("Failed loading products", err);
    app.showToast("Failed to load catalog products", "error");
  }
}

function buildCategoryChips() {
  const container = document.getElementById('category-chips-container');
  if (!container) return;
  
  // Find all unique categories
  const categories = new Set();
  app.products.forEach(p => {
    if (p.categories && Array.isArray(p.categories)) {
      p.categories.forEach(c => categories.add(c));
    }
  });
  
  let html = `<button class="chip ${catalogSelectedCategory === 'all' ? 'active' : ''}" data-category="all" onclick="selectCatalogCategory('all')">All Products</button>`;
  categories.forEach(cat => {
    html += `<button class="chip ${catalogSelectedCategory === cat ? 'active' : ''}" data-category="${cat}" onclick="selectCatalogCategory('${cat}')">${cat}</button>`;
  });
  
  container.innerHTML = html;
}

function selectCatalogCategory(cat) {
  catalogSelectedCategory = cat;
  document.querySelectorAll('#category-chips-container .chip').forEach(btn => {
    if (btn.getAttribute('data-category') === cat) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  filterCatalogProducts();
}

function setCatalogViewLayout(layout) {
  catalogLayout = layout;
  const grid = document.getElementById('catalog-results');
  const btnGrid = document.getElementById('btn-grid-view');
  const btnList = document.getElementById('btn-list-view');
  
  if (layout === 'list') {
    grid.classList.add('list-view');
    btnList.classList.add('active');
    btnGrid.classList.remove('active');
  } else {
    grid.classList.remove('list-view');
    btnGrid.classList.add('active');
    btnList.classList.remove('active');
  }
}

function filterCatalogProducts() {
  const searchInput = document.getElementById('catalog-search');
  const query = searchInput ? searchInput.value.toLowerCase().trim() : '';
  const sort = document.getElementById('catalog-sort').value;
  
  let filtered = [...app.products];
  
  // 1. Filter by category selection
  if (catalogSelectedCategory !== 'all') {
    filtered = filtered.filter(p => p.categories && p.categories.includes(catalogSelectedCategory));
  }
  
  // 2. Filter by search query
  if (query) {
    filtered = filtered.filter(p => {
      const matchName = p.displayName && p.displayName.toLowerCase().includes(query);
      const matchDesc = p.displayDescription && p.displayDescription.toLowerCase().includes(query);
      const matchStyle = p.displayStyle && p.displayStyle.toLowerCase().includes(query);
      const matchTags = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
      return matchName || matchDesc || matchStyle || matchTags;
    });
  }
  
  // 3. Sorting logic
  if (sort === 'name-asc') {
    filtered.sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
  } else if (sort === 'name-desc') {
    filtered.sort((a, b) => (b.displayName || '').localeCompare(a.displayName || ''));
  } else if (sort === 'style') {
    filtered.sort((a, b) => (a.displayStyle || '').localeCompare(b.displayStyle || ''));
  }
  
  renderCatalogProducts(filtered);
}

function renderCatalogProducts(products) {
  const container = document.getElementById('catalog-results');
  if (!container) return;
  
  if (products.length === 0) {
    container.innerHTML = `
      <div class="panel" style="grid-column: 1 / -1; text-align:center; padding: 4rem 2rem;">
        <i data-lucide="help-circle" style="width:2.5rem; height:2.5rem; color:var(--text-muted); margin-bottom:1rem;"></i>
        <h3>No Products Found</h3>
        <p style="color:var(--text-secondary); margin-top:0.5rem;">We couldn't find any API matching your criteria. Try resetting filters.</p>
      </div>
    `;
    lucide.createIcons();
    return;
  }
  
  let html = '';
  products.forEach(p => {
    // Pick standard icons based on style
    let icon = 'api';
    if (p.displayStyle === 'REST') icon = 'globe';
    if (p.displayStyle === 'MCP') icon = 'wrench';
    if (p.displayStyle === 'A2A') icon = 'bot';
    
    const styleClass = (p.displayStyle || '').toLowerCase();
    
    const tagsHtml = p.tags ? p.tags.map(t => `<span class="tag-badge">${t}</span>`).join('') : '';
    
    html += `
      <div class="product-card panel" onclick="app.navigate('product/${p.productId || p.id}')">
        <div class="prod-header">
          <div class="prod-icon">
            <i data-lucide="${icon}" style="width:1.5rem; height:1.5rem;"></i>
          </div>
          <span class="style-badge ${styleClass}">${p.displayStyle || 'API'}</span>
        </div>
        
        <div class="prod-body">
          <h3 class="prod-title">${p.displayName || p.name}</h3>
          <p class="prod-desc">${p.displayDescription || 'Access is available for this product on the enterprise platform.'}</p>
        </div>
        
        <div class="prod-footer">
          <div class="tag-list">
            ${tagsHtml}
          </div>
          <div style="color:var(--text-muted); display:flex; align-items:center; gap:0.25rem;">
            <span>Details</span>
            <i data-lucide="chevron-right" style="width:1rem; height:1rem;"></i>
          </div>
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
  lucide.createIcons();
}
</script>
