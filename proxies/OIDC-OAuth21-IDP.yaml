  - name: JS-AuthenticateUser
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-AuthenticateUser
        displayName: JS-AuthenticateUser
        properties: {}
        source: |
          var userPayload = context.getVariable("user_json_payload");
          var passwordSubmitted = context.getVariable("request.formparam.password");

          var authSuccess = false;
          var userProfile = null;

          if (userPayload) {
            try {
              userProfile = JSON.parse(userPayload);
              if (userProfile.password === passwordSubmitted) {
                authSuccess = true;
              } else {
                // Clean pure JS SHA-256 implementation
                function sha256(ascii) {
                    function rotateRight(n, x) {
                        return (n >>> x) | (n << (32 - x));
                    }

                    var h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
                    var h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;

                    var k = [
                        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
                    ];

                    var msgBytes = [];
                    for (var i = 0; i < ascii.length; i++) {
                        msgBytes.push(ascii.charCodeAt(i) & 0xFF);
                    }

                    var msgLenBits = msgBytes.length * 8;
                    msgBytes.push(0x80);
                    while ((msgBytes.length + 8) % 64 !== 0) {
                        msgBytes.push(0x00);
                    }

                    msgBytes.push(0x00);
                    msgBytes.push(0x00);
                    msgBytes.push(0x00);
                    msgBytes.push(0x00);
                    msgBytes.push((msgLenBits >>> 24) & 0xFF);
                    msgBytes.push((msgLenBits >>> 16) & 0xFF);
                    msgBytes.push((msgLenBits >>> 8) & 0xFF);
                    msgBytes.push(msgLenBits & 0xFF);

                    for (var chunkStart = 0; chunkStart < msgBytes.length; chunkStart += 64) {
                        var w = new Array(64);
                        for (var i = 0; i < 16; i++) {
                            w[i] = (msgBytes[chunkStart + i * 4] << 24) |
                                   (msgBytes[chunkStart + i * 4 + 1] << 16) |
                                   (msgBytes[chunkStart + i * 4 + 2] << 8) |
                                   msgBytes[chunkStart + i * 4 + 3];
                        }

                        for (var i = 16; i < 64; i++) {
                            var s0 = rotateRight(w[i - 15], 7) ^ rotateRight(w[i - 15], 18) ^ (w[i - 15] >>> 3);
                            var s1 = rotateRight(w[i - 2], 17) ^ rotateRight(w[i - 2], 19) ^ (w[i - 2] >>> 10);
                            w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
                        }

                        var a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, h = h7;

                        for (var i = 0; i < 64; i++) {
                            var s1_e = rotateRight(e, 6) ^ rotateRight(e, 11) ^ rotateRight(e, 25);
                            var ch = (e & f) ^ (~e & g);
                            var temp1 = (h + s1_e + ch + k[i] + w[i]) | 0;
                            var s0_a = rotateRight(a, 2) ^ rotateRight(a, 13) ^ rotateRight(a, 22);
                            var maj = (a & b) ^ (a & c) ^ (b & c);
                            var temp2 = (s0_a + maj) | 0;

                            h = g;
                            g = f;
                            f = e;
                            e = (d + temp1) | 0;
                            d = c;
                            c = b;
                            b = a;
                            a = (temp1 + temp2) | 0;
                        }

                        h0 = (h0 + a) | 0;
                        h1 = (h1 + b) | 0;
                        h2 = (h2 + c) | 0;
                        h3 = (h3 + d) | 0;
                        h4 = (h4 + e) | 0;
                        h5 = (h5 + f) | 0;
                        h6 = (h6 + g) | 0;
                        h7 = (h7 + h) | 0;
                    }

                    var bytes = [];
                    var words = [h0, h1, h2, h3, h4, h5, h6, h7];
                    for (var i = 0; i < 8; i++) {
                        bytes.push((words[i] >>> 24) & 0xFF);
                        bytes.push((words[i] >>> 16) & 0xFF);
                        bytes.push((words[i] >>> 8) & 0xFF);
                        bytes.push(words[i] & 0xFF);
                    }

                    var hex = "";
                    for (var i = 0; i < bytes.length; i++) {
                        var h = bytes[i].toString(16);
                        if (h.length < 2) h = "0" + h;
                        hex += h;
                    }
                    return hex;
                }

                var salt = "Apigee-IDP-Salt-";
                var hashedSubmitted = sha256(salt + userProfile.username + ":" + passwordSubmitted);
                if (userProfile.password === hashedSubmitted) {
                  authSuccess = true;
                }
              }
            } catch(e) {}
          }

          if (authSuccess && userProfile) {
            context.setVariable("auth_success", "true");
            context.setVariable("auth_failed", "false");
            context.setVariable("auth_error_message", "");

            // Generate cryptographically random code
            var chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            var authCode = "code_";
            for (var i = 0; i < 24; i++) {
              authCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            context.setVariable("auth_code", authCode);

            // Package authorization code parameters for cache storage
            var codeData = {
              username: userProfile.username,
              email: userProfile.email,
              name: userProfile.name,
              client_id: context.getVariable("auth_client_id"),
              redirect_uri: context.getVariable("auth_redirect_uri"),
              scope: context.getVariable("auth_scope"),
              code_challenge: context.getVariable("auth_code_challenge"),
              code_challenge_method: context.getVariable("auth_code_challenge_method")
            };

            context.setVariable("auth_code_data", JSON.stringify(codeData));
          } else {
            context.setVariable("auth_success", "false");
            context.setVariable("auth_failed", "true");
            context.setVariable("auth_error_message", "Invalid username or password");
          }
  - name: JS-CreateRefreshToken
