                      </div>
                  </div>
              </body>
              </html>
  - name: AM-RedirectCode
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-RedirectCode
        set:
          statusCode: "302"
          reasonPhrase: Found
          headers:
            header:
              metadata:
                name: Location
              value: "{auth_redirect_uri}?code={auth_code}&state={auth_state}"
          payload:
            metadata:
              contentType: text/plain
            value: ""
  - name: AM-RegisterClientFailure
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-RegisterClientFailure
        set:
          statusCode: "400"
          reasonPhrase: Bad Request
          payload:
            metadata:
              contentType: application/json
            value: |
              {
                "error": "{client_register_error}",
                "error_description": "{client_register_error_description}"
              }
  - name: AM-RegisterClientSuccess
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-RegisterClientSuccess
        set:
          statusCode: "201"
          reasonPhrase: Created
          payload:
            metadata:
              contentType: application/json
            value: "{registered_client_payload}"
  - name: AM-RegisterFailure
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-RegisterFailure
        set:
          statusCode: "400"
          reasonPhrase: Bad Request
          payload:
            metadata:
              contentType: text/html; charset=utf-8
            value: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
