  - name: JS-ExtractTokenParams
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-ExtractTokenParams
        displayName: JS-ExtractTokenParams
        properties: {}
        source: |
          var grantType = (context.getVariable("request.formparam.grant_type") || "").trim();
          var code = (context.getVariable("request.formparam.code") || "").trim();
          var redirectUri = (context.getVariable("request.formparam.redirect_uri") || "").trim();
          var clientId = (context.getVariable("request.formparam.client_id") || "").trim();
          var codeVerifier = (context.getVariable("request.formparam.code_verifier") || "").trim();
          var refreshToken = (context.getVariable("request.formparam.refresh_token") || "").trim();

          context.setVariable("token_grant_type", grantType);
          context.setVariable("token_code", code);
          context.setVariable("token_redirect_uri", redirectUri);
          context.setVariable("token_client_id", clientId);
          context.setVariable("token_code_verifier", codeVerifier);
          context.setVariable("token_refresh_token", refreshToken);

          // Assign lookup keys for cache
          if (grantType === "authorization_code") {
            context.setVariable("auth_code", code);
          } else if (grantType === "refresh_token") {
            context.setVariable("refresh_token", refreshToken);
          }

