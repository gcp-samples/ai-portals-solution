              </head>
              <body>
                  <div class="card">
                      <div class="icon-container">
                          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                      </div>
                      <h1>Registration Success!</h1>
                      <p>Your user profile has been successfully saved to our secure Apigee KVM Identity Store. You can now use your credentials to log in.</p>
                      <a href="/oauth/v2/authorize?client_id=my-portal-client&redirect_uri=https://localhost:8080/callback&response_type=code&scope=openid%20profile%20email&code_challenge=xyz&code_challenge_method=S256" class="btn">Proceed to Login</a>
                  </div>
              </body>
              </html>

  - name: AM-RegisterFailure
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-RegisterFailure
        set:
