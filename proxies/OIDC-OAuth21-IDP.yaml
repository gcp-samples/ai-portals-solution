        source: |
          // Generate a cryptographically secure random refresh token string
          var chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
          var rToken = "rt_";
          for (var i = 0; i < 32; i++) {
            rToken += chars.charAt(Math.floor(Math.random() * chars.length));
          }
          context.setVariable("token_refresh_token", rToken);

          var refreshData = {
            username: context.getVariable("token_username"),
            email: context.getVariable("token_email"),
            name: context.getVariable("token_name"),
            client_id: context.getVariable("token_client_id"),
            scope: context.getVariable("token_scope")
          };

          context.setVariable("refresh_token_data", JSON.stringify(refreshData));

