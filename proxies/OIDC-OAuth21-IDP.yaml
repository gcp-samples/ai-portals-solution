                          outline: none;
                          border-color: var(--primary);
                          box-shadow: 0 0 14px var(--primary-glow);
                          background: rgba(13, 20, 35, 0.85);
                      }
                      .btn {
                          width: 100%;
                          background: linear-gradient(135deg, var(--primary), var(--accent));
                          border: none;
                          border-radius: 10px;
                          padding: 14px;
                          color: #fff;
                          font-family: 'Outfit', sans-serif;
                          font-size: 1rem;
                          font-weight: 700;
                          cursor: pointer;
                          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                          box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
                          margin-top: 10px;
                      }
                      .btn:hover {
                          transform: translateY(-2px);
                          box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
                          filter: brightness(1.1);
                      }
                      .btn:active {
                          transform: translateY(0);
                      }
                      .footer-links {
                          margin-top: 25px;
                          text-align: center;
                          font-size: 0.9rem;
                          color: var(--text-muted);
                          font-family: 'Inter', sans-serif;
                      }
                      .footer-links a {
                          color: var(--primary);
                          text-decoration: none;
                          font-weight: 600;
                          transition: color 0.2s ease;
                      }
                      .footer-links a:hover {
                          color: #818cf8;
                          text-decoration: underline;
                      }
                      .error-alert {
                          background: rgba(239, 68, 68, 0.15);
                          border: 1px solid rgba(239, 68, 68, 0.3);
                          border-radius: 10px;
                          padding: 12px 16px;
                          color: #fca5a5;
                          font-size: 0.9rem;
                          margin-bottom: 20px;
                          font-family: 'Inter', sans-serif;
                          display: none;
                      }
                  </style>
              </head>
              <body>
                  <div class="glowing-blob blob-1"></div>
                  <div class="glowing-blob blob-2"></div>

                  <div class="card">
                      <div class="header">
                          <h1>Create Account</h1>
                          <p>Sign up to Apigee Identity Provider</p>
                      </div>

                      <div id="errorBox" class="error-alert"></div>

                      <form action="/register" method="POST" id="registerForm">
                          <!-- Pass OIDC params forward to register POST request -->
                          <input type="hidden" name="client_id" value="{request.queryparam.client_id}">
                          <input type="hidden" name="redirect_uri" value="{request.queryparam.redirect_uri}">
                          <input type="hidden" name="response_type" value="{request.queryparam.response_type}">
                          <input type="hidden" name="scope" value="{request.queryparam.scope}">
                          <input type="hidden" name="state" value="{request.queryparam.state}">
                          <input type="hidden" name="code_challenge" value="{request.queryparam.code_challenge}">
                          <input type="hidden" name="code_challenge_method" value="{request.queryparam.code_challenge_method}">
                          <div class="form-group">
                              <label for="name">Full Name</label>
                              <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required autocomplete="name">
                          </div>

                          <div class="form-group">
                              <label for="email">Email Address</label>
                              <input type="email" id="email" name="email" class="form-input" placeholder="john@example.com" required autocomplete="email">
                          </div>

                          <div class="form-group">
                              <label for="username">Username</label>
                              <input type="text" id="username" name="username" class="form-input" placeholder="johndoe" required autocomplete="username">
                          </div>

                          <div class="form-group">
                              <label for="password">Password</label>
                              <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                          </div>

                          <button type="submit" class="btn">Register</button>
                      </form>

                      <div class="footer-links">
                          Already have an account? <a href="javascript:history.back()">Login here</a>
                      </div>
                  </div>
              </body>
              </html>
