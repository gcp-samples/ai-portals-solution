  - name: JS-ProcessRegister
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-ProcessRegister
        displayName: JS-ProcessRegister
        properties: {}
        source: |
          var body = context.getVariable("request.content") || "";
          var contentType = context.getVariable("request.header.Content-Type") || "";

          var username, password, email, name;

          if (contentType.indexOf("application/json") > -1) {
            try {
              var json = JSON.parse(body);
              username = json.username;
              password = json.password;
              email = json.email;
              name = json.name;
            } catch (e) {
              context.setVariable("register_error", "Malformed JSON payload");
            }
          } else {
            // Retrieve from formparams (form-urlencoded)
            username = context.getVariable("request.formparam.username");
            password = context.getVariable("request.formparam.password");
            email = context.getVariable("request.formparam.email");
            name = context.getVariable("request.formparam.name");
          }

          if (!username || !password || !email || !name) {
            context.setVariable("register_error", "All fields are required (name, email, username, password)");
            context.setVariable("register_success", "false");
          } else {
            username = username.trim().toLowerCase();

            // Clean pure JS SHA-256 implementation
            function sha256(ascii) {
                function rotateRight(n, x) {
                    return (n >>> x) | (n << (32 - x));
                }

                var h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
                var h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;

                var k = [
                    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
                ];

                var msgBytes = [];
                for (var i = 0; i < ascii.length; i++) {
                    msgBytes.push(ascii.charCodeAt(i) & 0xFF);
                }

                var msgLenBits = msgBytes.length * 8;
                msgBytes.push(0x80);
                while ((msgBytes.length + 8) % 64 !== 0) {
                    msgBytes.push(0x00);
                }

                msgBytes.push(0x00);
                msgBytes.push(0x00);
                msgBytes.push(0x00);
                msgBytes.push(0x00);
                msgBytes.push((msgLenBits >>> 24) & 0xFF);
                msgBytes.push((msgLenBits >>> 16) & 0xFF);
                msgBytes.push((msgLenBits >>> 8) & 0xFF);
                msgBytes.push(msgLenBits & 0xFF);

                for (var chunkStart = 0; chunkStart < msgBytes.length; chunkStart += 64) {
                    var w = new Array(64);
                    for (var i = 0; i < 16; i++) {
                        w[i] = (msgBytes[chunkStart + i * 4] << 24) |
                               (msgBytes[chunkStart + i * 4 + 1] << 16) |
                               (msgBytes[chunkStart + i * 4 + 2] << 8) |
                               msgBytes[chunkStart + i * 4 + 3];
                    }

                    for (var i = 16; i < 64; i++) {
                        var s0 = rotateRight(w[i - 15], 7) ^ rotateRight(w[i - 15], 18) ^ (w[i - 15] >>> 3);
                        var s1 = rotateRight(w[i - 2], 17) ^ rotateRight(w[i - 2], 19) ^ (w[i - 2] >>> 10);
                        w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
                    }

                    var a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, h = h7;

                    for (var i = 0; i < 64; i++) {
                        var s1_e = rotateRight(e, 6) ^ rotateRight(e, 11) ^ rotateRight(e, 25);
                        var ch = (e & f) ^ (~e & g);
                        var temp1 = (h + s1_e + ch + k[i] + w[i]) | 0;
                        var s0_a = rotateRight(a, 2) ^ rotateRight(a, 13) ^ rotateRight(a, 22);
                        var maj = (a & b) ^ (a & c) ^ (b & c);
                        var temp2 = (s0_a + maj) | 0;

                        h = g;
                        g = f;
                        f = e;
                        e = (d + temp1) | 0;
                        d = c;
                        c = b;
                        b = a;
                        a = (temp1 + temp2) | 0;
                    }

                    h0 = (h0 + a) | 0;
                    h1 = (h1 + b) | 0;
                    h2 = (h2 + c) | 0;
                    h3 = (h3 + d) | 0;
                    h4 = (h4 + e) | 0;
                    h5 = (h5 + f) | 0;
                    h6 = (h6 + g) | 0;
                    h7 = (h7 + h) | 0;
                }

                var bytes = [];
                var words = [h0, h1, h2, h3, h4, h5, h6, h7];
                for (var i = 0; i < 8; i++) {
                    bytes.push((words[i] >>> 24) & 0xFF);
                    bytes.push((words[i] >>> 16) & 0xFF);
                    bytes.push((words[i] >>> 8) & 0xFF);
                    bytes.push(words[i] & 0xFF);
                }

                var hex = "";
                for (var i = 0; i < bytes.length; i++) {
                    var h = bytes[i].toString(16);
                    if (h.length < 2) h = "0" + h;
                    hex += h;
                }
                return hex;
            }

            var salt = "Apigee-IDP-Salt-";
            var hashedPassword = sha256(salt + username + ":" + password);

            var userRecord = {
              username: username,
              password: hashedPassword,
              email: email.trim(),
              name: name.trim()
            };

            var nameParts = name.trim().split(/\s+/);
            var firstName = nameParts[0] || "";
            var lastName = nameParts.slice(1).join(" ") || "Developer";

            context.setVariable("register_email", email.trim().toLowerCase());
            context.setVariable("register_username", username);
            context.setVariable("register_firstName", firstName);
            context.setVariable("register_lastName", lastName);

            context.setVariable("user_key", "user:" + username);
            context.setVariable("user_email_key", "user:" + email.trim().toLowerCase());
            context.setVariable("user_json_payload", JSON.stringify(userRecord));
            context.setVariable("register_success", "true");
            context.setVariable("registered_username", username);

            // Extract hidden OIDC params forward to flow context
            context.setVariable("auth_client_id", context.getVariable("request.formparam.client_id") || "");
            context.setVariable("auth_redirect_uri", context.getVariable("request.formparam.redirect_uri") || "");
            context.setVariable("auth_response_type", context.getVariable("request.formparam.response_type") || "");
            context.setVariable("auth_scope", context.getVariable("request.formparam.scope") || "");
            context.setVariable("auth_state", context.getVariable("request.formparam.state") || "");
            context.setVariable("auth_code_challenge", context.getVariable("request.formparam.code_challenge") || "");
            context.setVariable("auth_code_challenge_method", context.getVariable("request.formparam.code_challenge_method") || "");
          }
  - name: JS-ProcessRegisterClient
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-ProcessRegisterClient
        displayName: JS-ProcessRegisterClient
        properties: {}
        source: |
          try {
            var bodyStr = context.getVariable("request.content") || "{}";
            var body = JSON.parse(bodyStr);

            var clientName = (body.client_name || "Claude Code CLI").trim();
            var redirectUris = body.redirect_uris;
            if (!redirectUris || !Array.isArray(redirectUris) || redirectUris.length === 0) {
              throw new Error("Missing required 'redirect_uris' array.");
            }

            // Generate secure unique client_id and client_secret
            function randHex(len) {
              var chars = "abcdefghijklmnopqrstuvwxyz0123456789";
              var str = "";
              for (var i = 0; i < len; i++) {
                str += chars.charAt(Math.floor(Math.random() * chars.length));
              }
              return str;
            }

            var clientId = "cli-" + randHex(16);
            var clientSecret = "sec-" + randHex(32);

            var clientConfig = {
              client_id: clientId,
              client_secret: clientSecret,
              client_name: clientName,
              redirect_uris: redirectUris,
              grant_types: body.grant_types || ["authorization_code", "refresh_token"],
              response_types: body.response_types || ["code"],
              scope: body.scope || "openid profile email",
              client_id_issued_at: Math.floor(Date.now() / 1000)
            };

            context.setVariable("client_key", "client:" + clientId);
            context.setVariable("client_json_payload", JSON.stringify(clientConfig));
            context.setVariable("client_register_success", "true");

            context.setVariable("registered_client_id", clientId);
            context.setVariable("registered_client_secret", clientSecret);
            context.setVariable("registered_client_payload", JSON.stringify(clientConfig, null, 2));

          } catch (e) {
            context.setVariable("client_register_success", "false");
            context.setVariable("client_register_error", "invalid_client_metadata");
            context.setVariable("client_register_error_description", e.message || String(e));
          }
  - name: JS-SetupVerification
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-SetupVerification
        displayName: JS-SetupVerification
        properties: {}
        source: |
          var host = context.getVariable("request.header.host");
          var proto = context.getVariable("client.scheme") || "https";
          context.setVariable("token_issuer", proto + "://" + host);

          // public.key loaded from KVM GetSecurityKeys

          function decodeBase64(input) {
              var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
              var str = String(input).replace(/=+$/, '');
              var output = '';
              if (str.length % 4 == 1) {
                  throw new Error("Invalid base64 string.");
              }
              for (
                  var bc = 0, bs, buffer, idx = 0;
                  buffer = str.charAt(idx++);
                  ~buffer && (bs = bc % 4 ? bs * 64 + buffer : buffer,
                      bc++ % 4) ? output += String.fromCharCode(255 & bs >> (-2 * bc & 6)) : 0
              ) {
                  buffer = chars.indexOf(buffer);
              }
              return output;
          }

          var authHeader = context.getVariable("request.header.Authorization") || "";
          var aud = "";
          if (authHeader.indexOf("Bearer ") === 0) {
            var token = authHeader.substring(7).trim();
            var parts = token.split(".");
            if (parts.length === 3) {
              try {
                var payloadBase64 = parts[1];
                var base64 = payloadBase64.replace(/-/g, "+").replace(/_/g, "/");
                var decoded = decodeBase64(base64);
                var payload = JSON.parse(decoded);
                aud = payload.aud || "";
              } catch (e) {
                // Ignore decoding error
              }
            }
          }
          context.setVariable("verified_client_id", aud);
  - name: JS-ValidateAuthorize
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-ValidateAuthorize
        displayName: JS-ValidateAuthorize
        properties: {}
        source: |
          var verb = context.getVariable("request.verb");
          var clientId, redirectUri, responseType, scope, state, codeChallenge, codeChallengeMethod;

          if (verb === "POST") {
            clientId = context.getVariable("request.formparam.client_id");
            redirectUri = context.getVariable("request.formparam.redirect_uri");
            responseType = context.getVariable("request.formparam.response_type");
            scope = context.getVariable("request.formparam.scope") || "";
            state = context.getVariable("request.formparam.state") || "";
            codeChallenge = context.getVariable("request.formparam.code_challenge");
            codeChallengeMethod = context.getVariable("request.formparam.code_challenge_method");
          } else {
            clientId = context.getVariable("request.queryparam.client_id");
            redirectUri = context.getVariable("request.queryparam.redirect_uri");
            responseType = context.getVariable("request.queryparam.response_type");
            scope = context.getVariable("request.queryparam.scope") || "";
            state = context.getVariable("request.queryparam.state") || "";
            codeChallenge = context.getVariable("request.queryparam.code_challenge");
            codeChallengeMethod = context.getVariable("request.queryparam.code_challenge_method");
          }

          if (clientId) clientId = clientId.trim();
          if (redirectUri) redirectUri = redirectUri.trim();

          var isStatic = false;
          var clientConfig = null;

          if (clientId) {
            var clientJson = context.getVariable("client_json_payload");
            if (clientJson) {
              try {
                clientConfig = JSON.parse(clientJson);
              } catch (e) {
                // Ignore parse errors, clientConfig will be null
              }
            }
          }

          var error = null;
          var errorDesc = null;

          if (!clientId) {
            error = "invalid_client";
            errorDesc = "The client identifier is required.";
          } else {
            // Dynamic client validation
            if (!clientConfig) {
              error = "invalid_client";
              errorDesc = "The client identifier provided is invalid or not registered.";
            } else {
              // Validate redirect_uri matches any in the client's registered redirect_uris array
              var uris = clientConfig.redirect_uris;
              var found = false;
              if (uris && Array.isArray(uris)) {
                for (var i = 0; i < uris.length; i++) {
                  if (String(uris[i]).trim() === redirectUri) {
                    found = true;
                    break;
                  }
                }
              }
              if (!found) {
                error = "invalid_redirect_uri";
                errorDesc = "The redirect URI provided does not match any of the registered redirect URIs for this client.";
              }
            }
          }

          if (!error) {
            if (responseType !== "code") {
              error = "unsupported_response_type";
              errorDesc = "Only response_type=code (Authorization Code Flow) is supported under OAuth 2.1; implicit grant flow is disabled.";
            } else if (!codeChallenge || !codeChallengeMethod) {
              error = "invalid_request";
              errorDesc = "Proof Key for Code Exchange (PKCE) is MANDATORY under OAuth 2.1. Please provide code_challenge and code_challenge_method.";
            } else if (codeChallengeMethod !== "S256" && codeChallengeMethod !== "plain") {
              error = "invalid_request";
              errorDesc = "Only PKCE challenge methods 'S256' or 'plain' are supported.";
            }
          }

          if (error) {
            context.setVariable("authorize_valid", "false");
            context.setVariable("authorize_error", error);
            context.setVariable("authorize_error_description", errorDesc);
          } else {
            context.setVariable("authorize_valid", "true");
            context.setVariable("auth_client_id", clientId);
            context.setVariable("auth_redirect_uri", redirectUri);
            context.setVariable("auth_response_type", responseType);
            context.setVariable("auth_scope", scope);
            context.setVariable("auth_state", state);
            context.setVariable("auth_code_challenge", codeChallenge);
            context.setVariable("auth_code_challenge_method", codeChallengeMethod);
            context.setVariable("auth_error_message", "");
          }
  - name: JS-VerifyCodeAndPKCE
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-VerifyCodeAndPKCE
        displayName: JS-VerifyCodeAndPKCE
        properties: {}
        source: |
          // Clean pure JS SHA-256 implementation
          function sha256_base64url(ascii) {
              function rotateRight(n, x) {
                  return (n >>> x) | (n << (32 - x));
              }

              var h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
              var h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;

              var k = [
                  0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                  0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                  0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                  0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                  0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                  0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                  0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                  0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
              ];

              var msgBytes = [];
              for (var i = 0; i < ascii.length; i++) {
                  msgBytes.push(ascii.charCodeAt(i) & 0xFF);
              }

              var msgLenBits = msgBytes.length * 8;
              msgBytes.push(0x80);
              while ((msgBytes.length + 8) % 64 !== 0) {
                  msgBytes.push(0x00);
              }

              // Upper 4 bytes of 64-bit length are always 0 for short strings
              msgBytes.push(0x00);
              msgBytes.push(0x00);
              msgBytes.push(0x00);
              msgBytes.push(0x00);
              msgBytes.push((msgLenBits >>> 24) & 0xFF);
              msgBytes.push((msgLenBits >>> 16) & 0xFF);
              msgBytes.push((msgLenBits >>> 8) & 0xFF);
              msgBytes.push(msgLenBits & 0xFF);

              for (var chunkStart = 0; chunkStart < msgBytes.length; chunkStart += 64) {
                  var w = new Array(64);
                  for (var i = 0; i < 16; i++) {
                      w[i] = (msgBytes[chunkStart + i * 4] << 24) |
                             (msgBytes[chunkStart + i * 4 + 1] << 16) |
                             (msgBytes[chunkStart + i * 4 + 2] << 8) |
                             msgBytes[chunkStart + i * 4 + 3];
                  }

                  for (var i = 16; i < 64; i++) {
                      var s0 = rotateRight(w[i - 15], 7) ^ rotateRight(w[i - 15], 18) ^ (w[i - 15] >>> 3);
                      var s1 = rotateRight(w[i - 2], 17) ^ rotateRight(w[i - 2], 19) ^ (w[i - 2] >>> 10);
                      w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
                  }

                  var a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, h = h7;

                  for (var i = 0; i < 64; i++) {
                      var s1_e = rotateRight(e, 6) ^ rotateRight(e, 11) ^ rotateRight(e, 25);
                      var ch = (e & f) ^ (~e & g);
                      var temp1 = (h + s1_e + ch + k[i] + w[i]) | 0;
                      var s0_a = rotateRight(a, 2) ^ rotateRight(a, 13) ^ rotateRight(a, 22);
                      var maj = (a & b) ^ (a & c) ^ (b & c);
                      var temp2 = (s0_a + maj) | 0;

                      h = g;
                      g = f;
                      f = e;
                      e = (d + temp1) | 0;
                      d = c;
                      c = b;
                      b = a;
                      a = (temp1 + temp2) | 0;
                  }

                  h0 = (h0 + a) | 0;
                  h1 = (h1 + b) | 0;
                  h2 = (h2 + c) | 0;
                  h3 = (h3 + d) | 0;
                  h4 = (h4 + e) | 0;
                  h5 = (h5 + f) | 0;
                  h6 = (h6 + g) | 0;
                  h7 = (h7 + h) | 0;
              }

              var bytes = [];
              var words = [h0, h1, h2, h3, h4, h5, h6, h7];
              for (var i = 0; i < 8; i++) {
                  bytes.push((words[i] >>> 24) & 0xFF);
                  bytes.push((words[i] >>> 16) & 0xFF);
                  bytes.push((words[i] >>> 8) & 0xFF);
                  bytes.push(words[i] & 0xFF);
              }

              var base64 = "";
              var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
              for (var i = 0; i < bytes.length; i += 3) {
                  var b1 = bytes[i], b2 = i + 1 < bytes.length ? bytes[i + 1] : NaN, b3 = i + 2 < bytes.length ? bytes[i + 2] : NaN;
                  var enc1 = b1 >> 2;
                  var enc2 = ((b1 & 3) << 4) | (isNaN(b2) ? 0 : b2 >> 4);
                  var enc3 = isNaN(b2) ? NaN : (((b2 & 15) << 2) | (isNaN(b3) ? 0 : b3 >> 6));
                  var enc4 = isNaN(b3) ? NaN : b3 & 63;

                  base64 += chars.charAt(enc1) + chars.charAt(enc2);
                  if (!isNaN(enc3)) base64 += chars.charAt(enc3);
                  if (!isNaN(enc4)) base64 += chars.charAt(enc4);
              }
              return base64;
          }

          var codeDataStr = context.getVariable("auth_code_data");
          var codeVerifier = context.getVariable("token_code_verifier") || "";
          var clientIdSubmitted = context.getVariable("token_client_id");
          var redirectUriSubmitted = context.getVariable("token_redirect_uri");

          var error = null;
          var errorDesc = null;

          // Initialize debug variables to avoid unresolved variable crashes
          context.setVariable("token_debug_verifier", "");
          context.setVariable("token_debug_method", "");
          context.setVariable("token_debug_expected", "");
          context.setVariable("token_debug_calculated", "");

          if (!codeDataStr) {
            error = "invalid_grant";
            errorDesc = "The authorization code is invalid or has expired.";
          } else {
            try {
              var codeData = JSON.parse(codeDataStr);

              // Validate Client Match
              if (clientIdSubmitted && clientIdSubmitted !== codeData.client_id) {
                error = "invalid_client";
                errorDesc = "Client ID mismatch.";
              } else if (redirectUriSubmitted && redirectUriSubmitted !== codeData.redirect_uri) {
                error = "invalid_grant";
                errorDesc = "Redirect URI mismatch.";
              } else {
                 // PKCE Validation (Mandatory for OAuth 2.1)
                 if (!codeVerifier) {
                   error = "invalid_request";
                   errorDesc = "code_verifier parameter is required for PKCE validation under OAuth 2.1.";
                 } else {
                   context.setVariable("token_debug_verifier", codeVerifier);
                   context.setVariable("token_debug_method", codeData.code_challenge_method || "none");
                   context.setVariable("token_debug_expected", codeData.code_challenge || "none");

                   if (codeData.code_challenge_method === "S256") {
                     var challengeCalculated = sha256_base64url(codeVerifier);
                     context.setVariable("token_debug_calculated", challengeCalculated);
                     if (challengeCalculated !== codeData.code_challenge) {
                       error = "invalid_grant";
                       errorDesc = "PKCE verification failed (S256 challenge mismatch).";
                     }
                   } else if (codeData.code_challenge_method === "plain") {
                     context.setVariable("token_debug_calculated", codeVerifier);
                     if (codeVerifier !== codeData.code_challenge) {
                       error = "invalid_grant";
                       errorDesc = "PKCE verification failed (plain challenge mismatch).";
                     }
                   }
                 }
              }

              if (!error) {
                // Setup claims for native GenerateJWT policies
                var host = context.getVariable("request.header.host");
                var proto = context.getVariable("client.scheme") || "https";
                context.setVariable("token_issuer", proto + "://" + host);
                context.setVariable("token_client_id", codeData.client_id);
                context.setVariable("token_username", codeData.username);
                context.setVariable("token_email", codeData.email);
                context.setVariable("token_name", codeData.name);
                context.setVariable("token_auth_time", String(Math.floor(Date.now() / 1000)));
                context.setVariable("token_nonce", codeData.nonce || "none");

                var scope = codeData.scope || "";
                context.setVariable("token_scope", scope);
                context.setVariable("token_scope_has_openid", scope.indexOf("openid") > -1 ? "true" : "false");

                // private.key loaded from KVM GetSecurityKeys
                 if (!context.getVariable("private.key_id")) {
                   context.setVariable("private.key_id", "kid-1");
                 }

                context.setVariable("token_generation_allowed", "true");
              }
            } catch(e) {
              error = "invalid_grant";
              errorDesc = "Failed to process authorization code data.";
            }
          }

          if (error) {
            context.setVariable("token_generation_allowed", "false");
            context.setVariable("token_error", error);
            context.setVariable("token_error_description", errorDesc);
          }
  - name: JS-VerifyRefreshToken
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-VerifyRefreshToken
        displayName: JS-VerifyRefreshToken
        properties: {}
        source: |
          var refreshDataStr = context.getVariable("refresh_token_data");
          var clientIdSubmitted = context.getVariable("token_client_id");

          var error = null;
          var errorDesc = null;

          if (!refreshDataStr) {
            error = "invalid_grant";
            errorDesc = "Refresh token is invalid or has expired.";
          } else {
            try {
              var rData = JSON.parse(refreshDataStr);
              if (clientIdSubmitted && clientIdSubmitted !== rData.client_id) {
                error = "invalid_client";
                errorDesc = "Client ID mismatch.";
              } else {
                // Setup claims for GenerateJWT policies
                var host = context.getVariable("request.header.host");
                var proto = context.getVariable("client.scheme") || "https";
                context.setVariable("token_issuer", proto + "://" + host);
                context.setVariable("token_client_id", rData.client_id);
                context.setVariable("token_username", rData.username);
                context.setVariable("token_email", rData.email);
                context.setVariable("token_name", rData.name);

                var scope = rData.scope || "";
                context.setVariable("token_scope", scope);
                context.setVariable("token_scope_has_openid", scope.indexOf("openid") > -1 ? "true" : "false");

                // private.key loaded from KVM GetSecurityKeys
                if (!context.getVariable("private.key_id")) {
                  context.setVariable("private.key_id", "kid-1");
                }

                context.setVariable("token_generation_allowed", "true");
              }
            } catch(e) {
              error = "invalid_grant";
              errorDesc = "Failed to parse refresh token.";
            }
          }

          if (error) {
            context.setVariable("token_generation_allowed", "false");
            context.setVariable("token_error", error);
            context.setVariable("token_error_description", errorDesc);
          }
  - name: JWT-GenerateAccessToken
    type: GenerateJWT
    content:
      generateJwt:
        metadata:
          name: JWT-GenerateAccessToken
        algorithm: RS256
        ignoreUnresolvedVariables: "false"
        privateKey:
          setValue:
            metadata:
              ref: private.key
          id:
            metadata:
              ref: private.key_id
        issuer:
