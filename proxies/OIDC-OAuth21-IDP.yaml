        source: |
          var grantType = (context.getVariable("request.formparam.grant_type") || "").trim();
          var code = (context.getVariable("request.formparam.code") || "").trim();
          var redirectUri = (context.getVariable("request.formparam.redirect_uri") || "").trim();
