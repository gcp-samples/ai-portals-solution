                          animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
                      }
                      @keyframes fadeIn {
                          from { opacity: 0; transform: translateY(20px); }
                          to { opacity: 1; transform: translateY(0); }
                      }
                      .icon-container {
                          width: 80px;
