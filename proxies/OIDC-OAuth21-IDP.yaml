name: OIDC-OAuth21-IDP
displayName: OIDC-OAuth21-IDP
type: feature
categories: []
description: Complete Identity Provider, OpenID Connect & OAuth 2.1 BFF Proxy for Apigee
documentation: ""
parameters:
  - name: CLIENT_ID
    displayName: Client ID
    description: Allowed client ID for external apps
    default: my-portal-client
  - name: REDIRECT_URI
    displayName: Redirect URI
    description: Allowed redirect URI for external apps (exact match)
    default: https://localhost:8080/callback
basePath: /oauth/v2
defaultEndpoint:
  name: default
  basePath: /oauth/v2
  routes:
    - name: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: CORS-SetCors
    - name: GET OpenID Configuration
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/.well-known/openid-configuration") and (request.verb = "GET")
      steps:
        - name: JS-OidcConfig
    - name: GET JWKS
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/jwks.json") and (request.verb = "GET")
      steps:
        - name: AM-JWKS
    - name: GET Register
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/register") and (request.verb = "GET")
      steps:
        - name: AM-RegisterForm
    - name: POST Register
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/register") and (request.verb = "POST")
      steps:
        - name: JS-ProcessRegister
        - name: KVM-PutUser
          condition: register_success = "true"
        - name: AM-RegisterSuccess
          condition: register_success = "true"
        - name: AM-RegisterFailure
          condition: register_success = "false" or register_error != null
    - name: GET Authorize
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/authorize") and (request.verb = "GET")
      steps:
        - name: JS-ValidateAuthorize
        - name: AM-LoginForm
    - name: POST Login / Authorize
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/authorize") and (request.verb = "POST")
      steps:
        - name: JS-ExtractCredentials
        - name: KVM-GetUser
        - name: JS-AuthenticateUser
        - name: PC-StoreCode
          condition: auth_success = "true"
        - name: AM-RedirectCode
          condition: auth_success = "true"
        - name: AM-LoginFormWithError
          condition: auth_success = "false"
    - name: POST Token
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/token") and (request.verb = "POST")
      steps:
        - name: JS-ExtractTokenParams
        - name: LC-LookupCode
          condition: token_grant_type = "authorization_code"
        - name: LC-LookupRefreshToken
          condition: token_grant_type = "refresh_token"
        - name: JS-VerifyCodeAndPKCE
          condition: token_grant_type = "authorization_code"
        - name: JS-VerifyRefreshToken
          condition: token_grant_type = "refresh_token"
        - name: IC-InvalidateCode
          condition: (token_grant_type = "authorization_code") and (token_generation_allowed = "true")
        - name: IC-InvalidateRefreshToken
          condition: (token_grant_type = "refresh_token") and (token_generation_allowed = "true")
        - name: JWT-GenerateAccessToken
          condition: token_generation_allowed = "true"
        - name: JWT-GenerateIDToken
          condition: (token_generation_allowed = "true") and (token_scope_has_openid = "true")
        - name: JS-CreateRefreshToken
          condition: token_generation_allowed = "true"
        - name: PC-StoreRefreshToken
          condition: token_generation_allowed = "true"
        - name: AM-TokenResponse
          condition: token_generation_allowed = "true"
        - name: AM-TokenErrorResponse
          condition: token_generation_allowed = "false" or token_error != null
    - name: UserInfo
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/userinfo") and ((request.verb = "GET") or (request.verb = "POST"))
      steps:
        - name: JS-SetupVerification
        - name: JWT-VerifyAccessToken
        - name: AM-UserInfoResponse
endpoints: []
targets: []
policies:
  - name: CORS-SetCors
    type: CORS
    content:
      cors:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: CORS-SetCors
        displayName: CORS-SetCors
        allowOrigins: "{request.header.origin}"
        allowMethods: GET, PUT, POST, DELETE, OPTIONS
        allowHeaders: "*"
        exposeHeaders: "*"
        maxAge: "3628800"
        allowCredentials: "true"
        generatePreflightResponse: "true"
        ignoreUnresolvedVariables: "true"
  - name: AM-JWKS
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-JWKS
        set:
          payload:
            metadata:
              contentType: application/json
            value: |
              {
                "keys": [
                  {
                    "kty": "RSA",
                    "n": "1VRdVN4ulpvW6Q4PHQH-wEDwIrMTXaETd973mePKuHulEPOi2WnJ-EvByH3kGH3KVZ5IL1z4Z2hdzWwEJUY4RmfQ1-flL-PwO9Y1ewxP9_EuUiEYTqXi3cvnZiq7MOdQ1ymTi66K-fVZqiBRc7vsrFg69HZtSlHNvPU6z9XnrOS3ceCDIdJpSB8i719izs70Ra2FUVGehL0uyUUXy4cEGpGL1hJFVf_M7ri6v4993GTUQ0XeciTLE5C_vNGVwvNsBkwPuV2pguutAKTTkbc9Vw7dp7ALy6ealc-KJeM17D5ykCayvUPUMj5KUuESWSipEc98UHFBzL-gw8GxvPK9aQ",
                    "e": "AQAB",
                    "kid": "kid-1",
                    "use": "sig",
                    "alg": "RS256"
                  }
                ]
              }

  - name: JS-OidcConfig
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-OidcConfig
        displayName: JS-OidcConfig
        properties: {}
        source: |
          var host = context.getVariable("request.header.host");
          var proto = context.getVariable("client.scheme") || "https";
          var baseUrl = proto + "://" + host + "/oauth/v2";

          var config = {
            "issuer": baseUrl,
            "authorization_endpoint": baseUrl + "/authorize",
            "token_endpoint": baseUrl + "/token",
            "userinfo_endpoint": baseUrl + "/userinfo",
            "jwks_uri": baseUrl + "/jwks.json",
            "registration_endpoint": baseUrl + "/register",
            "scopes_supported": ["openid", "profile", "email"],
            "response_types_supported": ["code"],
            "grant_types_supported": ["authorization_code", "refresh_token"],
            "subject_types_supported": ["public"],
            "id_token_signing_alg_values_supported": ["RS256"],
            "code_challenge_methods_supported": ["S256", "plain"]
          };

          context.setVariable("response.content", JSON.stringify(config, null, 2));
          context.setVariable("response.header.content-type", "application/json");

  - name: AM-RegisterForm
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-RegisterForm
        set:
          payload:
            metadata:
              contentType: text/html; charset=utf-8
            value: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>IDP - Create Account</title>
                  <link rel="preconnect" href="https://fonts.googleapis.com">
                  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
                  <style>
                      :root {
                          --primary: #6366f1;
                          --primary-glow: rgba(99, 102, 241, 0.45);
                          --accent: #a855f7;
                          --bg: #090d16;
                          --card-bg: rgba(17, 25, 40, 0.55);
                          --border: rgba(255, 255, 255, 0.08);
                          --text: #f3f4f6;
                          --text-muted: #9ca3af;
                      }
                      * {
                          box-sizing: border-box;
                          margin: 0;
                          padding: 0;
                      }
                      body {
                          font-family: 'Outfit', sans-serif;
                          background-color: var(--bg);
                          background-image:
                              radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                              radial-gradient(at 90% 80%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
                          color: var(--text);
                          min-height: 100vh;
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          overflow: hidden;
                          position: relative;
                      }
                      .glowing-blob {
                          position: absolute;
                          width: 250px;
                          height: 250px;
                          border-radius: 50%;
                          background: var(--primary);
                          filter: blur(120px);
                          z-index: 1;
                          opacity: 0.6;
                          animation: float 10s ease-in-out infinite alternate;
                      }
                      .blob-1 { top: 15%; left: 10%; background: var(--primary); }
                      .blob-2 { bottom: 15%; right: 10%; background: var(--accent); animation-delay: -5s; }
                      @keyframes float {
                          0% { transform: translateY(0px) scale(1); }
                          100% { transform: translateY(30px) scale(1.15); }
                      }
                      .card {
                          background: var(--card-bg);
                          backdrop-filter: blur(16px);
                          -webkit-backdrop-filter: blur(16px);
                          border: 1px solid var(--border);
                          border-radius: 20px;
                          width: 100%;
                          max-width: 440px;
                          padding: 40px;
                          box-shadow: 0 15px 45px rgba(0, 0, 0, 0.45);
                          z-index: 10;
                          position: relative;
                          animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
                      }
                      @keyframes fadeIn {
                          from { opacity: 0; transform: translateY(20px); }
                          to { opacity: 1; transform: translateY(0); }
                      }
                      .header {
                          text-align: center;
                          margin-bottom: 30px;
                      }
                      .header h1 {
                          font-size: 2rem;
                          font-weight: 700;
                          background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
                          -webkit-background-clip: text;
                          -webkit-text-fill-color: transparent;
                          margin-bottom: 8px;
                      }
                      .header p {
                          color: var(--text-muted);
                          font-size: 0.95rem;
                          font-family: 'Inter', sans-serif;
                      }
                      .form-group {
                          margin-bottom: 20px;
