        source: |
          var host = context.getVariable("request.header.host");
          var proto = context.getVariable("client.scheme") || "https";
          context.setVariable("token_issuer", proto + "://" + host + "/oauth/v2");

          var publicKeyPem = "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA1VRdVN4ulpvW6Q4PHQH+\nwEDwIrMTXaETd973mePKuHulEPOi2WnJ+EvByH3kGH3KVZ5IL1z4Z2hdzWwEJUY4\nRmfQ1+flL+PwO9Y1ewxP9/EuUiEYTqXi3cvnZiq7MOdQ1ymTi66K+fVZqiBRc7vs\nrFg69HZtSlHNvPU6z9XnrOS3ceCDIdJpSB8i719izs70Ra2FUVGehL0uyUUXy4cE\nGpGL1hJFVf/M7ri6v4993GTUQ0XeciTLE5C/vNGVwvNsBkwPuV2pguutAKTTkbc9\nVw7dp7ALy6ealc+KJeM17D5ykCayvUPUMj5KUuESWSipEc98UHFBzL+gw8GxvPK9\naQIDAQAB\n-----END PUBLIC KEY-----\n";
          context.setVariable("public.key", publicKeyPem);

  - name: JWT-VerifyAccessToken
    type: VerifyJWT
    content:
      verifyJwt:
        metadata:
          name: JWT-VerifyAccessToken
        algorithm: RS256
        ignoreUnresolvedVariables: "false"
        publicKey:
          setValue:
            metadata:
              ref: public.key
        issuer:
          metadata:
            ref: token_issuer
        audience:
          metadata:
            ref: propertyset.oidc.CLIENT_ID

  - name: AM-UserInfoResponse
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-UserInfoResponse
        set:
          payload:
            metadata:
              contentType: application/json
            value: |
              {
                "sub": "{jwt.JWT-VerifyAccessToken.claim.subject}",
                "email": "{jwt.JWT-VerifyAccessToken.claim.email}",
                "name": "{jwt.JWT-VerifyAccessToken.claim.name}",
                "scope": "{jwt.JWT-VerifyAccessToken.claim.scope}"
              }

resources:
  - name: oidc.properties
    type: properties
    content: |
      CLIENT_ID={CLIENT_ID}
      REDIRECT_URI={REDIRECT_URI}
