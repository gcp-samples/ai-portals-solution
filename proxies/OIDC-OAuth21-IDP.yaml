                              <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required autocomplete="name">
                          </div>

                          <div class="form-group">
                              <label for="email">Email Address</label>
                              <input type="email" id="email" name="email" class="form-input" placeholder="john@example.com" required autocomplete="email">
                          </div>

                          <div class="form-group">
                              <label for="username">Username</label>
                              <input type="text" id="username" name="username" class="form-input" placeholder="johndoe" required autocomplete="username">
                          </div>

                          <div class="form-group">
                              <label for="password">Password</label>
                              <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                          </div>

                          <button type="submit" class="btn">Register</button>
                      </form>

                      <div class="footer-links">
                          Already have an account? <a href="/oauth/v2/authorize?client_id=my-portal-client&redirect_uri=https://localhost:8080/callback&response_type=code&scope=openid%20profile%20email&code_challenge=xyz&code_challenge_method=S256">Login here</a>
                      </div>
                  </div>
              </body>
              </html>

  - name: JS-ProcessRegister
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-ProcessRegister
        displayName: JS-ProcessRegister
        properties: {}
        source: |
          var body = context.getVariable("request.content") || "";
          var contentType = context.getVariable("request.header.Content-Type") || "";

          var username, password, email, name;

          if (contentType.indexOf("application/json") > -1) {
            try {
              var json = JSON.parse(body);
              username = json.username;
              password = json.password;
              email = json.email;
              name = json.name;
            } catch (e) {
              context.setVariable("register_error", "Malformed JSON payload");
            }
          } else {
            // Retrieve from formparams (form-urlencoded)
            username = context.getVariable("request.formparam.username");
            password = context.getVariable("request.formparam.password");
            email = context.getVariable("request.formparam.email");
            name = context.getVariable("request.formparam.name");
          }

          if (!username || !password || !email || !name) {
            context.setVariable("register_error", "All fields are required (name, email, username, password)");
            context.setVariable("register_success", "false");
          } else {
            username = username.trim().toLowerCase();
            var userRecord = {
              username: username,
              password: password,
              email: email.trim(),
              name: name.trim()
            };

            context.setVariable("user_key", "user:" + username);
            context.setVariable("user_json_payload", JSON.stringify(userRecord));
            context.setVariable("register_success", "true");
            context.setVariable("registered_username", username);
          }

  - name: KVM-PutUser
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          name: KVM-PutUser
          mapIdentifier: OIDC-Users
        scope: environment
        put:
          metadata:
            override: "true"
          key:
            parameter:
              metadata:
                ref: user_key
          setValue:
            metadata:
              ref: user_json_payload

  - name: AM-RegisterSuccess
    type: AssignMessage
    content:
