name: OIDC-OAuth21-IDP
displayName: OIDC-OAuth21-IDP
type: feature
description: Complete Identity Provider, OpenID Connect & OAuth 2.1 BFF Proxy for Apigee
documentation: ""
categories: []
parameters:
  - name: REDIRECT_URI
    displayName: Redirect URI
    description: Allowed redirect URI for external apps (exact match)
    default: https://localhost:8080/callback
defaultEndpoint:
  name: default
  basePath: /
  routes:
    - name: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: CORS-SetCors
    - name: GET OpenID Configuration
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/.well-known/openid-configuration")
        and (request.verb = "GET")
      steps:
        - name: JS-OidcConfig
    - name: GET JWKS
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/jwks.json") and (request.verb = "GET")
      steps:
        - name: JS-SetSecurityKeyNames
        - name: KVM-GetSecurityKeys
        - name: AM-JWKS
    - name: GET Register
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/register") and (request.verb = "GET")
      steps:
        - name: AM-RegisterForm
    - name: POST Register
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/register") and (request.verb = "POST")
        and (not (request.content Like "*redirect_uris*"))
      steps:
        - name: JS-ProcessRegister
        - name: SC-CreateDeveloper
          condition: register_success = "true"
        - name: KVM-PutUser
          condition: register_success = "true"
        - name: KVM-PutUserByEmail
          condition: register_success = "true"
        - name: AM-RegisterSuccess
          condition: register_success = "true"
        - name: AM-RegisterFailure
          condition: register_success = "false" or register_error != null
    - name: POST Register Client
      mode: Response
      condition: ((proxy.pathsuffix MatchesPath "/register-client") and (request.verb = "POST"))
        or ((proxy.pathsuffix MatchesPath "/register") and (request.verb = "POST") and (request.content Like "*redirect_uris*"))
      steps:
        - name: JS-ProcessRegisterClient
        - name: KVM-PutClient
          condition: client_register_success = "true"
        - name: AM-RegisterClientSuccess
          condition: client_register_success = "true"
        - name: AM-RegisterClientFailure
          condition: client_register_success = "false" or client_register_error != null
    - name: GET Authorize
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/authorize") and (request.verb = "GET")
      steps:
        - name: JS-ExtractClientAndSetKey
        - name: KVM-GetClient
          condition: (is_static_client = "false") and (client_id_extracted != null) and
            (client_id_extracted != "")
        - name: JS-ValidateAuthorize
        - name: AM-LoginForm
    - name: POST Login / Authorize
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/authorize") and (request.verb = "POST")
      steps:
        - name: JS-ExtractClientAndSetKey
        - name: KVM-GetClient
          condition: (is_static_client = "false") and (client_id_extracted != null) and
            (client_id_extracted != "")
        - name: JS-ValidateAuthorize
        - name: JS-ExtractCredentials
          condition: authorize_valid = "true"
        - name: KVM-GetUser
          condition: authorize_valid = "true"
        - name: JS-AuthenticateUser
          condition: authorize_valid = "true"
        - name: PC-StoreCode
          condition: (authorize_valid = "true") and (auth_success = "true")
        - name: AM-RedirectCode
          condition: (authorize_valid = "true") and (auth_success = "true")
        - name: AM-LoginFormWithError
          condition: (authorize_valid = "false") or (auth_success = "false")
    - name: POST Token
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/token") and (request.verb = "POST")
      steps:
        - name: JS-SetSecurityKeyNames
        - name: KVM-GetSecurityKeys
        - name: JS-ExtractTokenParams
        - name: LC-LookupCode
          condition: token_grant_type = "authorization_code"
        - name: LC-LookupRefreshToken
          condition: token_grant_type = "refresh_token"
        - name: JS-VerifyCodeAndPKCE
          condition: token_grant_type = "authorization_code"
        - name: JS-VerifyRefreshToken
          condition: token_grant_type = "refresh_token"
        - name: IC-InvalidateCode
          condition: (token_grant_type = "authorization_code") and
            (token_generation_allowed = "true")
        - name: IC-InvalidateRefreshToken
          condition: (token_grant_type = "refresh_token") and (token_generation_allowed =
            "true")
        - name: JWT-GenerateAccessToken
          condition: token_generation_allowed = "true"
        - name: JWT-GenerateIDToken
          condition: (token_generation_allowed = "true") and (token_scope_has_openid =
            "true")
        - name: JS-CreateRefreshToken
          condition: token_generation_allowed = "true"
        - name: PC-StoreRefreshToken
          condition: token_generation_allowed = "true"
        - name: AM-TokenResponse
          condition: token_generation_allowed = "true"
        - name: AM-TokenErrorResponse
          condition: token_generation_allowed = "false" or token_error != null
    - name: UserInfo
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/userinfo") and ((request.verb =
        "GET") or (request.verb = "POST"))
      steps:
        - name: JS-SetSecurityKeyNames
        - name: KVM-GetSecurityKeys
        - name: JS-SetupVerification
        - name: JWT-VerifyAccessToken
        - name: AM-UserInfoResponse
    - name: GET WellKnown
      mode: Response
      condition: (proxy.pathsuffix MatchesPath
        "/.well-known/oauth-protected-resource") and (request.verb = "GET")
      steps:
        - name: AM-SetWellKnown
    - name: GET AuthServer
      mode: Response
      condition: (proxy.pathsuffix MatchesPath
        "/.well-known/oauth-authorization-server") and (request.verb = "GET")
      steps:
        - name: AM-SetAuthServer
  faultRules: []
endpoints: []
targets: []
policies:
  - name: AM-JWKS
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-JWKS
        set:
          payload:
            metadata:
              contentType: application/json
            value: "{jwks_payload}"
  - name: AM-LoginForm
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-LoginForm
        set:
          payload:
            metadata:
              contentType: text/html; charset=utf-8
            value: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>IDP - Log In</title>
                  <link rel="preconnect" href="https://fonts.googleapis.com">
                  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
                  <style>
                      :root {
                          --primary: #6366f1;
                          --primary-glow: rgba(99, 102, 241, 0.45);
                          --accent: #a855f7;
                          --bg: #090d16;
                          --card-bg: rgba(17, 25, 40, 0.55);
                          --border: rgba(255, 255, 255, 0.08);
                          --text: #f3f4f6;
                          --text-muted: #9ca3af;
                      }
                      * { box-sizing: border-box; margin: 0; padding: 0; }
                      body {
                          font-family: 'Outfit', sans-serif;
                          background-color: var(--bg);
                          background-image:
                              radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                              radial-gradient(at 90% 80%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
                          color: var(--text);
                          min-height: 100vh;
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          overflow: hidden;
                          position: relative;
                      }
                      .glowing-blob {
                          position: absolute;
                          width: 250px;
                          height: 250px;
                          border-radius: 50%;
                          background: var(--primary);
                          filter: blur(120px);
                          z-index: 1;
                          opacity: 0.6;
                          animation: float 10s ease-in-out infinite alternate;
                      }
                      .blob-1 { top: 15%; left: 10%; background: var(--primary); }
                      .blob-2 { bottom: 15%; right: 10%; background: var(--accent); animation-delay: -5s; }
                      @keyframes float {
                          0% { transform: translateY(0px) scale(1); }
                          100% { transform: translateY(30px) scale(1.15); }
                      }
                      .card {
                          background: var(--card-bg);
                          backdrop-filter: blur(16px);
                          -webkit-backdrop-filter: blur(16px);
                          border: 1px solid var(--border);
                          border-radius: 20px;
                          width: 100%;
                          max-width: 440px;
                          padding: 40px;
                          box-shadow: 0 15px 45px rgba(0, 0, 0, 0.45);
                          z-index: 10;
                          position: relative;
                          animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
                      }
                      @keyframes fadeIn {
                          from { opacity: 0; transform: translateY(20px); }
                          to { opacity: 1; transform: translateY(0); }
                      }
                      .header { text-align: center; margin-bottom: 30px; }
                      .header h1 {
                          font-size: 2rem;
                          font-weight: 700;
                          background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
                          -webkit-background-clip: text;
                          -webkit-text-fill-color: transparent;
                          margin-bottom: 8px;
                      }
                      .header p { color: var(--text-muted); font-size: 0.95rem; font-family: 'Inter', sans-serif; }
                      .form-group { margin-bottom: 20px; position: relative; }
                      .form-group label {
                          display: block;
                          margin-bottom: 8px;
                          color: var(--text);
                          font-size: 0.9rem;
                          font-weight: 600;
                          letter-spacing: 0.05em;
                          text-transform: uppercase;
                      }
                      .form-input {
                          width: 100%;
                          background: rgba(13, 20, 35, 0.6);
                          border: 1px solid var(--border);
                          border-radius: 10px;
                          padding: 12px 16px;
                          color: var(--text);
                          font-family: 'Inter', sans-serif;
                          font-size: 0.95rem;
                          transition: all 0.3s ease;
                      }
                      .form-input:focus {
                          outline: none;
                          border-color: var(--primary);
                          box-shadow: 0 0 14px var(--primary-glow);
                          background: rgba(13, 20, 35, 0.85);
                      }
                      .btn {
                          width: 100%;
                          background: linear-gradient(135deg, var(--primary), var(--accent));
                          border: none;
                          border-radius: 10px;
                          padding: 14px;
                          color: #fff;
                          font-family: 'Outfit', sans-serif;
                          font-size: 1rem;
                          font-weight: 700;
                          cursor: pointer;
                          transition: all 0.3s ease;
                          box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
                          margin-top: 10px;
                      }
                      .btn:hover {
                          transform: translateY(-2px);
                          box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
                          filter: brightness(1.1);
                      }
                      .btn:active { transform: translateY(0); }
                      .footer-links {
                          margin-top: 25px;
                          text-align: center;
                          font-size: 0.9rem;
                          color: var(--text-muted);
                          font-family: 'Inter', sans-serif;
                      }
                      .footer-links a {
                          color: var(--primary);
                          text-decoration: none;
                          font-weight: 600;
                      }
                      .footer-links a:hover { text-decoration: underline; }
                      .error-alert {
                          background: rgba(239, 68, 68, 0.15);
                          border: 1px solid rgba(239, 68, 68, 0.3);
                          border-radius: 10px;
                          padding: 12px 16px;
                          color: #fca5a5;
                          font-size: 0.9rem;
                          margin-bottom: 20px;
                          font-family: 'Inter', sans-serif;
                      }
                      .oauth-badge {
                          display: inline-block;
                          background: rgba(255, 255, 255, 0.05);
                          border: 1px solid var(--border);
                          border-radius: 20px;
                          padding: 4px 12px;
                          font-size: 0.8rem;
                          font-weight: 600;
                          color: var(--text-muted);
                          margin-bottom: 15px;
                          text-transform: uppercase;
                      }
                  </style>
              </head>
              <body>
                  <div class="glowing-blob blob-1"></div>
                  <div class="glowing-blob blob-2"></div>

                  <div class="card">
                      <div class="header">
                          <span class="oauth-badge">OIDC & OAuth 2.1 IDP</span>
                          <h1>Sign In</h1>
                          <p>Sign in to proceed to your application</p>
                      </div>

                      <form action="/authorize" method="POST" id="loginForm">
                          <!-- OAuth 2.1 Hidden Params -->
                          <input type="hidden" name="client_id" value="{auth_client_id}">
                          <input type="hidden" name="redirect_uri" value="{auth_redirect_uri}">
                          <input type="hidden" name="response_type" value="{auth_response_type}">
                          <input type="hidden" name="scope" value="{auth_scope}">
                          <input type="hidden" name="state" value="{auth_state}">
                          <input type="hidden" name="code_challenge" value="{auth_code_challenge}">
                          <input type="hidden" name="code_challenge_method" value="{auth_code_challenge_method}">

                          <div class="form-group">
                              <label for="username">Email Address</label>
                              <input type="text" id="username" name="username" class="form-input" placeholder="john@example.com" required autocomplete="username">
                          </div>

                          <div class="form-group">
                              <label for="password">Password</label>
                              <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                          </div>

                          <button type="submit" class="btn">Authenticate</button>
                      </form>

                      <div class="footer-links">
                          Don't have an account? <a href="/register?client_id={auth_client_id}&amp;redirect_uri={auth_redirect_uri}&amp;response_type={auth_response_type}&amp;scope={auth_scope}&amp;state={auth_state}&amp;code_challenge={auth_code_challenge}&amp;code_challenge_method={auth_code_challenge_method}">Register here</a>
                      </div>
                  </div>
              </body>
              </html>
  - name: AM-LoginFormWithError
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          name: AM-LoginFormWithError
        set:
          payload:
            metadata:
              contentType: text/html; charset=utf-8
            value: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>IDP - Log In Error</title>
                  <link rel="preconnect" href="https://fonts.googleapis.com">
                  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
