  - name: AM-RegisterForm
    type: AssignMessage
    content:
      assignMessage:
        ignoreUnresolvedVariables: "true"
        metadata:
          name: AM-RegisterForm
        set:
          payload:
            metadata:
              contentType: text/html; charset=utf-8
            value: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>IDP - Create Account</title>
                  <link rel="preconnect" href="https://fonts.googleapis.com">
                  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
                  <style>
                      :root {
                          --primary: #6366f1;
                          --primary-glow: rgba(99, 102, 241, 0.45);
                          --accent: #a855f7;
                          --bg: #090d16;
                          --card-bg: rgba(17, 25, 40, 0.55);
                          --border: rgba(255, 255, 255, 0.08);
                          --text: #f3f4f6;
                          --text-muted: #9ca3af;
                      }
                      * {
                          box-sizing: border-box;
                          margin: 0;
                          padding: 0;
                      }
                      body {
                          font-family: 'Outfit', sans-serif;
                          background-color: var(--bg);
                          background-image:
                              radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                              radial-gradient(at 90% 80%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
                          color: var(--text);
                          min-height: 100vh;
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          overflow: hidden;
                          position: relative;
                      }
                      .glowing-blob {
                          position: absolute;
                          width: 250px;
                          height: 250px;
                          border-radius: 50%;
                          background: var(--primary);
                          filter: blur(120px);
                          z-index: 1;
                          opacity: 0.6;
                          animation: float 10s ease-in-out infinite alternate;
                      }
                      .blob-1 { top: 15%; left: 10%; background: var(--primary); }
                      .blob-2 { bottom: 15%; right: 10%; background: var(--accent); animation-delay: -5s; }
                      @keyframes float {
                          0% { transform: translateY(0px) scale(1); }
                          100% { transform: translateY(30px) scale(1.15); }
                      }
                      .card {
                          background: var(--card-bg);
                          backdrop-filter: blur(16px);
                          -webkit-backdrop-filter: blur(16px);
                          border: 1px solid var(--border);
