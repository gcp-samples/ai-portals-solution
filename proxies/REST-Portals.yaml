  - name: JWT-AccessToken
    type: VerifyJWT
    content:
      verifyJwt:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: JWT-AccessToken
        displayName: JWT-AccessToken
        algorithm: RS256
        source: extracted_access_token
        publicKey:
          setValue:
            metadata:
              ref: public.key
        issuer: https://8.232.129.124.nip.io
  - name: KVM-LoadConfig
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: KVM-LoadConfig
          mapIdentifier: AI-Portals
        displayName: KVM-LoadConfig
        properties: {}
        exclusiveCache: "false"
        expiryTimeInSecs: "300"
        get:
          - metadata:
              assignTo: portalAuthApiKey
              index: "1"
            key:
              parameter: portal-auth-apikey
          - metadata:
              assignTo: portalAuthDomain
              index: "1"
            key:
              parameter: portal-auth-domain
          - metadata:
              assignTo: portalTitle
              index: "1"
            key:
              parameter: portal-title
        scope: environment
  - name: RC-ResponseCache
    type: ResponseCache
    content:
      responseCache:
        metadata:
          continueOnError: "false"
          enabled: "false"
          name: RC-ResponseCache
        displayName: RC-ResponseCache
        cacheKey:
          prefix: {}
          keyFragment:
            metadata:
              ref: request.uri
              type: string
        scope: Exclusive
        expirySettings:
          expiryDate: {}
          timeOfDay: {}
          timeoutInSeconds:
            metadata:
              ref: ""
            value: "3600"
        skipCacheLookup: {}
        skipCachePopulation: {}
  - name: SC-AddAppProduct
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-AddAppProduct
        displayName: SC-AddAppProduct
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: PUT
            payload:
              metadata:
                contentType: application/json
              value: "{appUpdatedCredential}"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers/{userEmail}/apps/{appName}/keys/{appClientId}
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-CreateApp
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-CreateApp
        displayName: SC-CreateApp
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: POST
            payload: "{appPayload}"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers/{userEmail}/apps
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-CreateUser
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "true"
          enabled: "true"
          name: SC-CreateUser
        displayName: SC-CreateUser
        properties: {}
        request:
          metadata:
            clearPayload: "false"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: POST
            headers:
              header:
                metadata:
                  name: Content-Type
                value: application/json
            payload: "{request.content}"
        response: calloutResponse
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetAPIs
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-GetAPIs
        displayName: SC-GetAPIs
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apihub.googleapis.com/v1/projects/{organization.name}/locations/{system.region.name}/apis
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetAnalyticsApp
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-GetAnalyticsApp
        displayName: SC-GetAnalyticsApp
        properties: {}
        request:
          metadata:
            clearPayload: "true"
