name: REST-Portals
displayName: REST-Portals
type: proxy
categories: []
description: REST-Portals
documentation: ""
parameters:
  - name: DISPLAY_NAME
    displayName: DISPLAY_NAME
    description: Configuration input for DISPLAY_NAME
    default: Apigee AI Portal
    examples: []
    maps: {}
  - name: AUTH_API_KEY
    displayName: AUTH_API_KEY
    description: Configuration input for AUTH_API_KEY
    default: null
    examples: []
    maps: {}
  - name: AUTH_DOMAIN
    displayName: AUTH_DOMAIN
    description: Configuration input for AUTH_DOMAIN
    default: null
    examples: []
    maps: {}
endpoints:
  - name: default
    basePath: /api/portals
    routes:
      - name: default
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: CORS-SetCors
          - name: RC-ResponseCache
          - name: AM-SetVariables
          - name: KVM-LoadConfig
          - name: JS-SetSecurityKeyNames
          - name: KVM-GetPublicKey
      - name: GET Products
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/products") and (request.verb = "GET")
        steps:
          - name: SC-GetAPIs
          - name: SC-GetProducts
          - name: JS-TransformProducts
          - name: RC-ResponseCache
      - name: GET Product Detail
        mode: Request
        condition: (proxy.pathsuffix MatchesPath "/*/products/*") and (request.verb =
          "GET")
        steps:
          - name: SC-GetAPIs
          - name: SC-GetProducts
          - name: JS-FindProductAndSetVersion
      - name: GET Product Detail
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/products/*") and (request.verb =
          "GET")
        steps:
          - name: SC-GetDeployment
          - name: SC-GetVersion
          - name: JS-ParseSpecName
          - name: SC-GetSpecContents
            condition: has_specs = "true"
          - name: JS-TransformProductDetail
      - name: POST Login
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/login") and (request.verb =
          "POST")
        steps:
          - name: SC-CreateUser
      - name: GET Apps
        mode: Request
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
          "GET")
        steps:
          - name: JS-ExtractToken
          - name: JWT-AccessToken
      - name: GET Apps
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
          "GET")
        steps:
          - name: SC-GetApps
          - name: JS-TransformApps
      - name: POST Apps
        mode: Request
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
          "POST")
        steps:
          - name: JS-ExtractToken
          - name: JWT-AccessToken
          - name: EV-ParseUrl
      - name: POST Apps
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
          "POST")
        steps:
          - name: JS-SetApp
          - name: SC-CreateApp
          - name: JS-TransformApps
      - name: PUT App
        mode: Request
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps/*") and (request.verb
          = "PUT")
        steps:
          - name: JS-ExtractToken
          - name: JWT-AccessToken
          - name: EV-ParseUrl
      - name: PUT App
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps/*") and (request.verb
          = "PUT")
        steps:
          - name: SC-GetApp
          - name: JS-SetApp
          - name: SC-AddAppProduct
            condition: appOperation = "ADDED"
          - name: SC-RemoveAppProduct
            condition: appOperation = "REMOVED"
          - name: JS-TransformApps
      - name: GET Analytics
        mode: Request
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/analytics") and
          (request.verb = "GET")
        steps:
          - name: JS-ExtractToken
          - name: JWT-AccessToken
      - name: GET Analytics
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*/users/*/analytics") and
          (request.verb = "GET")
        steps:
          - name: JS-SetTimeRange
          - name: SC-GetAnalyticsApp
          - name: SC-GetAnalyticsProduct
          - name: SC-GetAnalyticsModel
          - name: JS-SetAnalyticsResponse
      - name: GET Portals
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/*") and (request.verb = "GET")
        steps:
          - name: JS-GetPortal
      - name: POST MCP
        mode: Request
        condition: (proxy.pathsuffix MatchesPath "/mcp") and (request.verb = "POST")
        steps:
          - name: JS-ExtractToken
          - name: JWT-AccessToken
      - name: POST MCP
        mode: Response
        condition: (proxy.pathsuffix MatchesPath "/mcp") and (request.verb = "POST")
        steps:
          - name: JS-MCP
      - name: GET WellKnown
        mode: Response
        condition: (proxy.pathsuffix MatchesPath
          "/.well-known/oauth-protected-resource") and (request.verb = "GET")
        steps:
          - name: JS-SetWellKnown
    faultRules: []
    defaultFaultRule:
      name: default-fault
      steps:
        - name: AM-SetWellKnown
targets: []
policies:
  - name: AM-SetVariables
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetVariables
        displayName: AM-SetVariables
        properties: {}
        assignVariable:
          name: jwt.issuer
          template: https://securetoken.google.com/{organization.name}
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: AM-SetWellKnown
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetWellKnown
        displayName: AM-SetWellKnown
        properties: {}
        set:
          headers:
            header:
              metadata:
                name: WWW-Authenticate
              value: Bearer
                resource_metadata="https://8.232.129.124.nip.io/.well-known/oauth-protected-resource"
        comment: " Crucial step: Assign this to the error context "
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: response
          value: error
  - name: CORS-SetCors
    type: CORS
    content:
      cors:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: CORS-SetCors
        displayName: CORS-SetCors
        allowOrigins: "{request.header.origin}"
        allowMethods: GET, PUT, POST, DELETE
        allowHeaders: "*"
        exposeHeaders: "*"
        maxAge: "3628800"
        allowCredentials: "false"
        generatePreflightResponse: "true"
        ignoreUnresolvedVariables: "true"
  - name: EV-ParseUrl
    type: ExtractVariables
    content:
      extractVariables:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: EV-ParseUrl
        displayName: EV-ParseUrl
        properties: {}
        uriPath:
          pattern:
            - metadata:
                ignoreCase: "false"
              value: /{portalId}/users/{userEmail}/apps/{appName}
            - metadata:
                ignoreCase: "false"
              value: /{portalId}/users/{userEmail}/apps
        ignoreUnresolvedVariables: "true"
        source:
          metadata:
            clearPayload: "false"
          value: request
        variablePrefix: {}
  - name: JS-ExtractToken
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-ExtractToken
        displayName: JS-ExtractToken
        properties: {}
        source: |
          var authHeader = context.getVariable("request.header.Authorization");
          if (authHeader) {
            var token = authHeader.trim();
            if (token.toLowerCase().indexOf("bearer ") === 0) {
              token = token.slice(7).trim();
            }
            context.setVariable("extracted_access_token", token);
          }
  - name: JS-FindProductAndSetVersion
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-FindProductAndSetVersion
        displayName: JS-FindProductAndSetVersion
        properties: {}
        source: |
          var paths = context.getVariable("proxy.pathsuffix").split("/");
          var productId = paths[paths.length - 1];
          context.setVariable("productId", productId);

          var apisRaw = context.getVariable("response.content");
          var productsRaw = context.getVariable("productResponse.content");

          if (apisRaw && productsRaw) {
            try {
              var apisObject = JSON.parse(apisRaw);
              var productsObject = JSON.parse(productsRaw);
              var result = transformApisToProducts(apisObject, productsObject);
              if (result && Array.isArray(result.products)) {
                var foundProduct = null;
                for (var i = 0; i < result.products.length; i++) {
                  var p = result.products[i];
                  if (p && (p.id === productId || p.productId === productId)) {
                    foundProduct = p;
                    break;
                  }
                }

                if (foundProduct) {
                  context.setVariable("apihub_version_name", foundProduct.sourceId);
                  context.setVariable("product_display_style", foundProduct.displayStyle);
                  context.setVariable("realProductJson", JSON.stringify(foundProduct));
                }
              }
            } catch (e) {
              print("Error in JS-FindProductAndSetVersion: " + e);
            }
          }
        includeUrl: jsc://transformations.js
  - name: JS-GetPortal
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-GetPortal
        displayName: JS-GetPortal
        properties: {}
        source: "

          \    var urlParts =
          context.getVariable(\"request.path\").split(\"/\");

          \    var portalId = urlParts[urlParts.length - 1];

          \    // var match = portalsConfig.filter(function(portal) {

          \    //  return portal.id == urlParts[urlParts.length - 1];

          \    //})[0];


          \    // var displayName =
          context.getVariable(\"propertyset.portals.DISPLAY_NAME\");

          \    var authApiKey = context.getVariable(\"portalAuthApiKey\");

          \    var authDomain = context.getVariable(\"portalAuthDomain\");

          \    var portalTitle = context.getVariable(\"portalTitle\");


          \    if (!authDomain) authDomain =
          context.getVariable(\"organization.name\") + \".firebaseapp.com\";


          \    var result = {

          \      name: portalTitle,

          \      authApiKey: authApiKey,

          \      authDomain: authDomain

          \    };

          \    context.setVariable(\"response.content\",
          JSON.stringify(result));


