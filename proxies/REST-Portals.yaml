name: REST-Portals
displayName: REST-Portals
type: feature
description: REST-Portals
documentation: ""
categories: []
parameters:
  - name: DISPLAY_NAME
    displayName: DISPLAY_NAME
    description: Configuration input for DISPLAY_NAME
    default: Apigee AI Portal
    examples: []
    maps: {}
  - name: AUTH_API_KEY
    displayName: AUTH_API_KEY
    description: Configuration input for AUTH_API_KEY
    default: null
    examples: []
    maps: {}
  - name: AUTH_DOMAIN
    displayName: AUTH_DOMAIN
    description: Configuration input for AUTH_DOMAIN
    default: null
    examples: []
    maps: {}
defaultEndpoint:
  name: default
  basePath: /api/portals
  routes:
    - name: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: CORS-SetCors
        - name: RC-ResponseCache
        - name: AM-SetVariables
        - name: KVM-LoadConfig
        - name: JS-SetSecurityKeyNames
        - name: KVM-GetPublicKey
    - name: GET Products
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*/products") and (request.verb = "GET")
      steps:
        - name: SC-GetAPIs
        - name: SC-GetProducts
        - name: JS-TransformProducts
        - name: RC-ResponseCache
    - name: POST Login
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/login") and (request.verb =
        "POST")
      steps:
        - name: SC-CreateUser
    - name: GET Apps
      mode: Request
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
        "GET")
      steps:
        - name: JS-ExtractToken
        - name: JWT-AccessToken
    - name: GET Apps
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
        "GET")
      steps:
        - name: SC-GetApps
        - name: JS-TransformApps
    - name: POST Apps
      mode: Request
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
        "POST")
      steps:
        - name: JS-ExtractToken
        - name: JWT-AccessToken
        - name: EV-ParseUrl
    - name: POST Apps
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps") and (request.verb =
        "POST")
      steps:
        - name: JS-SetApp
        - name: SC-CreateApp
        - name: JS-TransformApps
    - name: PUT App
      mode: Request
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps/*") and (request.verb
        = "PUT")
      steps:
        - name: JS-ExtractToken
        - name: JWT-AccessToken
        - name: EV-ParseUrl
    - name: PUT App
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/apps/*") and (request.verb
        = "PUT")
      steps:
        - name: SC-GetApp
        - name: JS-SetApp
        - name: SC-AddAppProduct
          condition: appOperation = "ADDED"
        - name: SC-RemoveAppProduct
          condition: appOperation = "REMOVED"
        - name: JS-TransformApps
    - name: GET Analytics
      mode: Request
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/analytics") and
        (request.verb = "GET")
      steps:
        - name: JS-ExtractToken
        - name: JWT-AccessToken
    - name: GET Analytics
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*/users/*/analytics") and
        (request.verb = "GET")
      steps:
        - name: JS-SetTimeRange
        - name: SC-GetAnalyticsApp
        - name: SC-GetAnalyticsProduct
        - name: SC-GetAnalyticsModel
        - name: JS-SetAnalyticsResponse
    - name: GET Portals
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/*") and (request.verb = "GET")
      steps:
        - name: JS-GetPortal
    - name: POST MCP
      mode: Request
      condition: (proxy.pathsuffix MatchesPath "/mcp") and (request.verb = "POST")
      steps:
        - name: JS-ExtractToken
        - name: JWT-AccessToken
    - name: POST MCP
      mode: Response
      condition: (proxy.pathsuffix MatchesPath "/mcp") and (request.verb = "POST")
      steps:
        - name: JS-MCP
    - name: GET WellKnown
      mode: Response
      condition: (proxy.pathsuffix MatchesPath
        "/.well-known/oauth-protected-resource") and (request.verb = "GET")
      steps:
        - name: JS-SetWellKnown
  faultRules: []
  defaultFaultRule:
    name: default-fault
    steps:
      - name: AM-SetWellKnown
endpoints: []
targets: []
policies:
  - name: JS-SetSecurityKeyNames
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-SetSecurityKeyNames
        displayName: JS-SetSecurityKeyNames
        properties: {}
        source: |
          context.setVariable("kvm_public_key_ref", "key:public_key");
  - name: KVM-GetPublicKey
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          name: KVM-GetPublicKey
          mapIdentifier: OIDC-Users
        scope: environment
        get:
          - metadata:
              assignTo: public.key
            key:
              parameter:
                metadata:
                  ref: kvm_public_key_ref
  - name: AM-SetVariables
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetVariables
        displayName: AM-SetVariables
        properties: {}
        assignVariable:
          name: jwt.issuer
          template: https://securetoken.google.com/{organization.name}
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: AM-SetWellKnown
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetWellKnown
        displayName: AM-SetWellKnown
        properties: {}
        set:
          headers:
            header:
              metadata:
                name: WWW-Authenticate
              value: Bearer
                resource_metadata="https://8.232.129.124.nip.io/.well-known/oauth-protected-resource"
        comment: " Crucial step: Assign this to the error context "
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: response
          value: error
  - name: CORS-SetCors
    type: CORS
    content:
      cors:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: CORS-SetCors
        displayName: CORS-SetCors
        allowOrigins: "{request.header.origin}"
        allowMethods: GET, PUT, POST, DELETE
        allowHeaders: "*"
        exposeHeaders: "*"
        maxAge: "3628800"
        allowCredentials: "false"
        generatePreflightResponse: "true"
        ignoreUnresolvedVariables: "true"
  - name: EV-ParseUrl
    type: ExtractVariables
    content:
      extractVariables:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: EV-ParseUrl
        displayName: EV-ParseUrl
        properties: {}
        uriPath:
          pattern:
            metadata:
              ignoreCase: "false"
            value: /{portalId}/users/{userEmail}/apps/{appName}
        ignoreUnresolvedVariables: "true"
        source:
          metadata:
            clearPayload: "false"
          value: request
        variablePrefix: {}
  - name: JS-ExtractToken
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-ExtractToken
        displayName: JS-ExtractToken
        properties: {}
        source: |
          var authHeader = context.getVariable("request.header.Authorization");
          if (authHeader) {
            var token = authHeader.trim();
            if (token.toLowerCase().indexOf("bearer ") === 0) {
              token = token.slice(7).trim();
            }
            context.setVariable("extracted_access_token", token);
          }
