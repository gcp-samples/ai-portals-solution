          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetAnalyticsProduct
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-GetAnalyticsProduct
        displayName: SC-GetAnalyticsProduct
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
        response: analyticsProductResponse
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/environments/{environment.name}/stats/api_product?select=sum(message_count),sum(dc_ai_prompt_token_count),sum(dc_ai_response_token_count),avg(dc_ai_time_first_token)&timeUnit=day&timeRange={apigee.timeRange}&filter=%28developer_email%20eq%20%27{jwt.JWT-AccessToken.claim.email}%27%29
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetApp
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-GetApp
        displayName: SC-GetApp
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers/{jwt.JWT-AccessToken.claim.email}/apps/{appName}
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetApps
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-GetApps
        displayName: SC-GetApps
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers/{jwt.JWT-AccessToken.claim.email}/apps?expand=true
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetProducts
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-GetProducts
        displayName: SC-GetProducts
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
        response: productResponse
        httpTargetConnection:
          properties: {}
