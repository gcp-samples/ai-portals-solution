  - name: JS-MCP
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-MCP
        displayName: JS-MCP
        properties: {}
        source: "

          \    var id = request.content.asJSON.id;

          \    if (request.content.asJSON.method == \"initialize\") {

          \      response.content = JSON.stringify({

          \        jsonrpc: \"2.0\",

          \        id: id,

          \        result: initialize(request.content.asJSON)

          \      });

          \    } else if (request.content.asJSON.method == \"tools/list\") {

          \      response.content = JSON.stringify({

          \        jsonrpc: \"2.0\",

          \        id: id,

          \        result: toolsList(request.content.asJSON)

          \      });

          \    } else if (request.content.asJSON.method == \"tools/call\") {

          \      response.content = JSON.stringify({

          \        jsonrpc: \"2.0\",

          \        id: id,

          \        result: callTool(request.content.asJSON.params.name,
          request.content.asJSON.params.arguments)

          \      });

          \    }


          \  "
        includeUrl: jsc://mcp.js
  - name: JS-ParseSpecName
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "true"
          enabled: "true"
          timeLimit: "200"
          name: JS-ParseSpecName
        displayName: JS-ParseSpecName
        properties: {}
        source: |
          try {
            var raw = context.getVariable("versionResponse.content");
            if (raw) {
              var versionData = JSON.parse(raw);
              if (versionData && versionData.specs && versionData.specs.length > 0) {
                var firstSpec = versionData.specs[0];
                if (firstSpec && firstSpec.name) {
                  context.setVariable("apihub_spec_contents_url", firstSpec.name);
                  context.setVariable("has_specs", "true");
                } else {
                  context.setVariable("has_specs", "false");
                }
              } else {
                context.setVariable("has_specs", "false");
              }
            } else {
              context.setVariable("has_specs", "false");
            }
          } catch(e) {
            context.setVariable("has_specs", "false");
          }
  - name: JS-SetAnalyticsResponse
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetAnalyticsResponse
        displayName: JS-SetAnalyticsResponse
        properties: {}
        source: "

          \    var responsePayload = {};

          \    var appResponse =
          context.getVariable(\"analyticsAppResponse.content\");

          \    var modelResponse =
          context.getVariable(\"analyticsModelResponse.content\");

          \    var productResponse =
          context.getVariable(\"analyticsProductResponse.content\");

          \    responsePayload[\"app\"] = [JSON.parse(appResponse)];

          \    responsePayload[\"model\"] = [JSON.parse(modelResponse)];

          \    responsePayload[\"product\"] = [JSON.parse(productResponse)];


          \    context.setVariable(\"response.content\",
          JSON.stringify(responsePayload));

          \    context.setVariable(\"response.header.content-type\",
          \"application/json\");

          \  "
  - name: JS-SetApp
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetApp
        displayName: JS-SetApp
        properties: {}
        source: "

          var originalApp = response.content.asJSON;

          var updateApp = request.content.asJSON;


          print(response.content);

          print(request.content);


          if (context.proxyRequest.method == \"PUT\") {

          \  print(\"Now doing update...\");

          \  var changes = checkAppCredentials(updateApp, originalApp);

          \  print(JSON.stringify(changes));

          \  if (changes[0]) {

          \    context.setVariable(\"appOperation\", changes[0].operationName);

          \    context.setVariable(\"appApiProduct\", changes[0].apiProduct);

          \    context.setVariable(\"appClientId\", changes[0].clientId);

          \    context.setVariable(\"appUpdatedCredential\",
          JSON.stringify({\"apiProducts\": changes[0].apiProducts}));

          \  }

          } else {

          \  context.setVariable(\"appPayload\",
          JSON.stringify(transformAppToApigee(request.content.asJSON)));

          }

          \  "
        includeUrl: jsc://transformations.js
  - name: JS-SetSecurityKeyNames
    type: Javascript
    content:
      javascript:
        metadata:
          name: JS-SetSecurityKeyNames
        displayName: JS-SetSecurityKeyNames
        properties: {}
        source: |
          context.setVariable("kvm_public_key_ref", "key:public_key");
  - name: JS-SetTimeRange
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetTimeRange
        displayName: JS-SetTimeRange
        properties: {}
        source: "

          \    var timeRange = getApigeeTimeRange();

          \    context.setVariable(\"apigee.timeRange\", timeRange);


          \    var email =
          context.getVariable(\"jwt.JWT-AccessToken.claim.email\");

          \  "
        includeUrl: jsc://transformations.js
  - name: JS-SetWellKnown
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetWellKnown
        displayName: JS-SetWellKnown
        properties: {}
        source: "

          \    response.content = JSON.stringify({

          \  \"resource\":
          \"https://8.232.129.124.nip.io/api/portals/mcp\",   \"authorization_s\
          ervers\": [

          \    \"https://8.232.129.124.nip.io\"

          \  ],

          \  \"scopes_supported\": [

          \    \"openid\",

          \    \"profile\",

          \    \"email\",

          \    \"mcp\"

          \  ],

          \  \"bearer_methods_supported\": [

          \    \"header\"

          \  ]

          });

          \  "
        includeUrl: jsc://mcp.js
  - name: JS-TransformApps
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-TransformApps
        displayName: JS-TransformApps
        properties: {}
        source: "

          \    print(response.content);

          \    var responseObject = response.content.asJSON;

          \    var result;

          \    if (!responseObject.app)

          \      result = transformApp(responseObject);

          \    else

          \      result = transformApps(responseObject);

          \    if (result)

          \      response.content = JSON.stringify(result);

          \    else

          \      response.content = {\"apps\": []};

          \  "
        includeUrl: jsc://transformations.js
  - name: JS-TransformProductDetail
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-TransformProductDetail
        displayName: JS-TransformProductDetail
        properties: {}
        source: |
          var productId = context.getVariable("productId");
          var deploymentRaw = context.getVariable("deploymentResponse.content");
          var versionRaw = context.getVariable("specContentsResponse.content") || context.getVariable("versionResponse.content");
          var realProductJson = context.getVariable("realProductJson");

          var deploymentData = null;
          if (deploymentRaw) {
            try {
              deploymentData = JSON.parse(deploymentRaw);
            } catch(e) {}
          }

          var versionData = null;
          if (versionRaw) {
            try {
              versionData = JSON.parse(versionRaw);
            } catch(e) {}
          }

          var mockProducts = null;
          var realProduct = null;
          if (realProductJson) {
            try {
              realProduct = JSON.parse(realProductJson);
              mockProducts = { "products": [realProduct] };
            } catch(e) {}
          }

          var result = transformProductDetail(deploymentData, versionData, productId, mockProducts);

          if (!result.spec) {
            if (result.displayStyle === "MCP") {
              result.spec = {
                "tools": [
                  {
                    "name": "query",
                    "description": "Run analytical SQL queries",
                    "inputSchema": {
                      "type": "object",
                      "properties": {
                        "sql": { "type": "string" }
                      },
                      "required": ["sql"]
                    }
                  }
                ]
              };
            } else {
              var displayName = (realProduct && (realProduct.displayName || realProduct.name)) || productId;
              result.spec = "openapi: 3.0.0\ninfo:\n  title: " + displayName + " Spec\n  version: 1.0.0\npaths:\n  /:\n    get:\n      responses:\n        '200':\n          description: Success";
            }
          }

          response.content = JSON.stringify(result);
          response.headers["Content-Type"] = "application/json";
        includeUrl: jsc://transformations.js
  - name: JS-TransformProducts
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-TransformProducts
        displayName: JS-TransformProducts
        properties: {}
        source: "

          \    var responseObject = response.content.asJSON;

          \    var productResponse =
          context.getVariable(\"productResponse.content\");

          \    print(productResponse);

          \    var productResponseObject = JSON.parse(productResponse);

          \    var result = transformApisToProducts(responseObject,
          productResponseObject);

          \    if (result)

          \      response.content = JSON.stringify(result);

          \    else

          \      response.content = {\"products\": []};

          \  "
        includeUrl: jsc://transformations.js
  - name: JWT-AccessToken
    type: VerifyJWT
    content:
      verifyJwt:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: JWT-AccessToken
        displayName: JWT-AccessToken
        algorithm: RS256
        source: extracted_access_token
        publicKey:
          setValue:
            metadata:
              ref: public.key
        issuer: https://8.232.129.124.nip.io
  - name: KVM-GetPublicKey
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          name: KVM-GetPublicKey
          mapIdentifier: OIDC-Users
        scope: environment
        get:
          metadata:
            assignTo: public.key
          key:
            parameter:
              metadata:
                ref: kvm_public_key_ref
  - name: KVM-LoadConfig
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: KVM-LoadConfig
          mapIdentifier: AI-Portals
        displayName: KVM-LoadConfig
        properties: {}
        exclusiveCache: "false"
        expiryTimeInSecs: "300"
        get:
          - metadata:
              assignTo: portalAuthApiKey
              index: "1"
            key:
              parameter: portal-auth-apikey
          - metadata:
              assignTo: portalAuthDomain
              index: "1"
            key:
              parameter: portal-auth-domain
          - metadata:
              assignTo: portalTitle
              index: "1"
            key:
              parameter: portal-title
        scope: environment
  - name: RC-ResponseCache
    type: ResponseCache
    content:
      responseCache:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: RC-ResponseCache
        displayName: RC-ResponseCache
        cacheKey:
          prefix: {}
          keyFragment:
            metadata:
              ref: request.uri
              type: string
        scope: Exclusive
        expirySettings:
          expiryDate: {}
          timeOfDay: {}
          timeoutInSeconds:
            metadata:
              ref: ""
            value: "3600"
        skipCacheLookup: {}
        skipCachePopulation: {}
  - name: SC-AddAppProduct
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-AddAppProduct
        displayName: SC-AddAppProduct
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: PUT
            payload:
              metadata:
                contentType: application/json
              value: "{appUpdatedCredential}"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers/{userEmail}/apps/{appName}/keys/{appClientId}
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-CreateApp
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-CreateApp
        displayName: SC-CreateApp
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: POST
            payload: "{appPayload}"
        response: response
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers/{userEmail}/apps
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-CreateUser
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "true"
          enabled: "true"
          name: SC-CreateUser
        displayName: SC-CreateUser
        properties: {}
        request:
          metadata:
            clearPayload: "false"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: POST
            headers:
              header:
                metadata:
                  name: Content-Type
                value: application/json
            payload: "{request.content}"
        response: calloutResponse
        httpTargetConnection:
          properties: {}
          url: https://apigee.googleapis.com/v1/organizations/{organization.name}/developers
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: SC-GetAPIs
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
